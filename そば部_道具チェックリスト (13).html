<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>そば部 道具チェックリスト</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
try {
  const cfg = JSON.parse(localStorage.getItem('soba-fb-cfg')||'null');
  if(cfg?.databaseURL){
    const app = initializeApp(cfg);
    const db  = getDatabase(app);
    window._db=db; window._fbRef=ref; window._fbOnValue=onValue; window._fbSet=set;
    window._firebaseReady=true;
  } else { window._firebaseReady=false; }
} catch(e){ window._firebaseReady=false; }
document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --soba:#5C3D11;--soba2:#8B5E2D;--soba-light:#FDF6ED;--soba-mid:#F0E4CC;
  --sale:#1A5E3A;--sale2:#2E8B57;--sale-light:#EDF7F2;--sale-mid:#B8E0CB;
  --inst:#1A3E7C;--inst2:#2E60BF;--inst-light:#EEF3FB;--inst-mid:#B8CCF0;
  --other:#5B21B6;--other2:#7C3AED;--other-light:#F5F0FF;--other-mid:#D4C5F5;
  --border:#DDD5C8;--bg:#F5F0E8;--card:#FFF;--text:#2C1A0A;--muted:#7A6248;
  --shadow:0 2px 14px rgba(92,61,17,.11);--red:#B91C1C;
}
html,body{height:100%;margin:0;padding:0;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* topbar */
.topbar{background:var(--soba);color:#fff;padding:0 18px;height:54px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.25);position:relative;z-index:200;flex-shrink:0}
.tlogo{font-size:22px}
.ttitle{font-size:15px;font-weight:900;letter-spacing:.04em;line-height:1.2}
.ttitle small{display:block;font-size:10px;font-weight:400;opacity:.7;letter-spacing:.05em}
.spacer{flex:1}
.sync-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.2);border-radius:12px;padding:3px 10px;font-size:11px}
.sdot{width:7px;height:7px;border-radius:50%;background:#FCD34D;flex-shrink:0;transition:.3s}
.sdot.on{background:#4ADE80;box-shadow:0 0 5px #4ADE80}
.tbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:rgba(255,255,255,.15);color:#fff;transition:.15s;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.28)}
.tbtn.wh{background:#fff;color:var(--soba)}.tbtn.wh:hover{background:var(--soba-light)}

/* breadcrumb */
.bc{display:flex;align-items:center;gap:6px;padding:7px 20px;background:var(--soba-mid);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);flex-shrink:0}
.bc-link{cursor:pointer;color:var(--soba2);font-weight:700}.bc-link:hover{text-decoration:underline}
.bc-sep{opacity:.5}.bc-cur{color:var(--text);font-weight:700}

/* layout */
.app{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;min-height:0}
.main{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch}

/* sidebar */
.sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.sb-head h3{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.07em}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 10px;min-height:0}
.ev-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;transition:.15s;border:1.5px solid transparent;margin-bottom:3px}
.ev-item:hover{background:var(--soba-light)}.ev-item.active{background:var(--soba-light);border-color:var(--soba2);font-weight:700}
.ev-dot{width:8px;height:8px;border-radius:50%;background:var(--soba2);flex-shrink:0}
.ev-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-date{font-size:10px;color:var(--muted);flex-shrink:0}
.ev-del{background:none;border:none;color:transparent;cursor:pointer;font-size:13px;padding:1px 4px;border-radius:3px;transition:.15s;flex-shrink:0}
.ev-item:hover .ev-del{color:#CBD5E1}.ev-del:hover{color:var(--red)!important;background:#FEF2F2}
.sb-add{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.sb-input{border:1.5px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;outline:none;background:#fff;width:100%;display:block;margin-bottom:4px}
.sb-input:focus{border-color:var(--soba2)}
.sb-add-row{display:flex;gap:5px;margin-top:4px}
.sb-add-btn{background:var(--soba);color:#fff;border:none;border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;flex-shrink:0}
.sb-prog{padding:8px 14px 6px;border-top:1px solid var(--border);flex-shrink:0}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px}
.prog-track{background:#EDE8DF;border-radius:4px;height:5px;overflow:hidden;margin-bottom:5px}
.prog-fill{height:5px;border-radius:4px;transition:.4s}
.prog-fill.sale{background:var(--sale2)}.prog-fill.inst{background:var(--inst2)}.prog-fill.other{background:var(--other2)}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:40px;text-align:center}
.welcome .big{font-size:56px;margin-bottom:6px}
.welcome h2{font-size:20px;font-weight:900;color:var(--soba)}
.welcome p{font-size:14px;color:var(--muted);line-height:1.7}

/* type select */
.type-screen{padding:28px 28px}
.type-screen>h2{font-size:20px;font-weight:900;color:var(--soba);margin-bottom:4px}
.type-screen>p{font-size:13px;color:var(--muted);margin-bottom:24px}
.type-cards{display:flex;gap:14px;flex-wrap:wrap}
.type-card{flex:1;min-width:190px;max-width:300px;border-radius:14px;border:2.5px solid var(--border);padding:26px 20px;cursor:pointer;transition:.2s;background:var(--card);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center}
.type-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.13)}
.type-card.sale:hover,.type-card.sale.sel{border-color:var(--sale2);background:var(--sale-light)}
.type-card.inst:hover,.type-card.inst.sel{border-color:var(--inst2);background:var(--inst-light)}
.type-card.other:hover,.type-card.other.sel{border-color:var(--other2);background:var(--other-light)}
.tc-icon{font-size:44px;line-height:1}
.tc-name{font-size:18px;font-weight:900}
.type-card.sale .tc-name{color:var(--sale)}.type-card.inst .tc-name{color:var(--inst2)}.type-card.other .tc-name{color:var(--other2)}
.tc-desc{font-size:12px;color:var(--muted);line-height:1.6}
.tc-roles{display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
.tc-pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.sale .tc-pill{background:var(--sale-mid);color:var(--sale)}.inst .tc-pill{background:var(--inst-mid);color:var(--inst2)}.other .tc-pill{background:var(--other-mid);color:var(--other2)}
.tc-prog-wrap{width:100%;margin-top:6px}
.tc-prog-label{font-size:11px;color:var(--muted);text-align:right;margin-bottom:2px}
.tc-prog-bar{background:#E5E5E5;border-radius:4px;height:6px;overflow:hidden}
.tc-prog-fill{height:6px;border-radius:4px;transition:.4s}

/* checklist */
.check-screen{padding:18px 22px}
.role-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.rtab{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:.15s;display:flex;align-items:center;gap:5px}
.rtab:hover{border-color:var(--soba2)}
.rtab.active.sale{background:var(--sale2);color:#fff;border-color:var(--sale2)}
.rtab.active.inst{background:var(--inst2);color:#fff;border-color:var(--inst2)}
.rtab.active.other{background:var(--other2);color:#fff;border-color:var(--other2)}
.rbadge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(0,0,0,.1)}
.rtab.active .rbadge{background:rgba(255,255,255,.3)}
.sec-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;margin-bottom:12px}
.sec-bar.sale{background:var(--sale-mid)}.sec-bar.inst{background:var(--inst-mid)}.sec-bar.other{background:var(--other-mid)}
.sec-bar h3{flex:1;font-size:15px;font-weight:900}
.sec-bar.sale h3{color:var(--sale)}.sec-bar.inst h3{color:var(--inst2)}.sec-bar.other h3{color:var(--other2)}
.sec-count{font-size:12px;font-weight:500;opacity:.8}
.reset-btn{background:rgba(0,0,0,.1);border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:9px;margin-bottom:14px}
.item-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.18s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.item-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.10);transform:translateY(-1px)}
.item-card.checked.sale{background:var(--sale-light);border-color:var(--sale2)}
.item-card.checked.inst{background:var(--inst-light);border-color:var(--inst2)}
.item-card.checked.other{background:var(--other-light);border-color:var(--other2)}
.item-chk{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;font-size:14px;background:#fff}
.item-card.checked.sale .item-chk{background:var(--sale2);border-color:var(--sale2);color:#fff}
.item-card.checked.inst .item-chk{background:var(--inst2);border-color:var(--inst2);color:#fff}
.item-card.checked.other .item-chk{background:var(--other2);border-color:var(--other2);color:#fff}
.item-body{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:700;line-height:1.3}
.item-qty{font-size:11px;color:var(--muted);margin-top:1px}
.item-by{font-size:10px;margin-top:2px;font-weight:500}
.item-card.checked.sale .item-by{color:var(--sale)}.item-card.checked.inst .item-by{color:var(--inst2)}.item-card.checked.other .item-by{color:var(--other2)}
.item-acts{display:flex;gap:2px;flex-shrink:0}
.ia{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:4px;font-size:13px;color:#C8BFB3;transition:.15s}
.ia:hover{background:var(--soba-mid);color:var(--soba2)}
.add-row{display:flex;gap:7px;padding:11px 13px;background:var(--soba-light);border:1.5px dashed var(--border);border-radius:10px;margin-bottom:24px;flex-wrap:wrap}
.add-row input{border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit;background:#fff;outline:none;transition:.15s}
.add-row input:focus{border-color:var(--soba2)}
.add-row .ni{flex:1;min-width:130px}.add-row .qi{width:130px}
.add-btn{background:var(--soba);color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* master */
.master-screen{padding:20px 24px}
.mtype-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.mtype-tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:.15s}
.mtype-tab.active.sale{background:var(--sale2);color:#fff;border-color:var(--sale2)}
.mtype-tab.active.inst{background:var(--inst2);color:#fff;border-color:var(--inst2)}
.mtype-tab.active.other{background:var(--other2);color:#fff;border-color:var(--other2)}
.mrole-block{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.mrole-title{font-size:14px;font-weight:900;margin-bottom:8px}
.mrole-title.sale{color:var(--sale)}.mrole-title.inst{color:var(--inst2)}.mrole-title.other{color:var(--other2)}
.mrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F0EBE0}
.mrow:last-of-type{border-bottom:none}
.mrow-name{flex:1;font-size:13px}.mrow-qty{font-size:12px;color:var(--muted);min-width:80px}

/* history */
.hist-screen{padding:20px 24px}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hc-info{flex:1;min-width:0}.hc-title{font-size:14px;font-weight:700}.hc-meta{font-size:12px;color:var(--muted);margin-top:2px}
.hdel{background:#FEF2F2;color:var(--red);border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;width:400px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.22)}
.modal h3{font-size:16px;font-weight:900;margin-bottom:16px;color:var(--soba)}
.modal label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:3px}
.modal input,.modal textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--soba2)}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.mbtn{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.mbtn.cancel{background:#F0EBE0;color:var(--soba2)}.mbtn.ok{background:var(--soba);color:#fff}.mbtn.ok:hover{background:var(--soba2)}

/* ── Approval flow ── */
.apv-section{
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)
}
.apv-title{font-size:13px;font-weight:900;color:var(--soba);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.apv-flow{display:flex;align-items:stretch;gap:0}
.apv-step{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;transition:.2s;position:relative
}
.apv-step.done{border-color:transparent}
.apv-step.done.role-step{background:var(--sale-light);border-color:var(--sale2)}
.apv-step.done.captain-step{background:var(--inst-light);border-color:var(--inst2)}
.apv-step.done.advisor-step{background:#FFF7E6;border-color:#D97706}
.apv-arrow{display:flex;align-items:center;padding:0 4px;font-size:18px;color:var(--border);flex-shrink:0;align-self:center}
.apv-step-icon{font-size:24px;line-height:1}
.apv-step-label{font-size:11px;font-weight:700;color:var(--muted);text-align:center}
.apv-step.done.role-step .apv-step-label{color:var(--sale)}
.apv-step.done.captain-step .apv-step-label{color:var(--inst2)}
.apv-step.done.advisor-step .apv-step-label{color:#D97706}
.apv-step-info{font-size:10px;color:var(--muted);text-align:center;line-height:1.4}
.apv-step.done .apv-step-info{font-weight:500}
.apv-btn{
  padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;
  font-family:inherit;transition:.15s;white-space:nowrap;margin-top:2px
}
.apv-btn.role-btn{background:var(--sale2);color:#fff}
.apv-btn.captain-btn{background:var(--inst2);color:#fff}
.apv-btn.advisor-btn{background:#D97706;color:#fff}
.apv-btn:disabled{background:#CCC;cursor:not-allowed}
.apv-btn.revoke{background:#FEF2F2;color:var(--red);font-size:10px;padding:3px 8px}
.apv-lock-msg{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;padding:6px;background:#F5F0E8;border-radius:6px}
/* ── toast ── */
.toast{position:fixed;bottom:20px;right:20px;background:#2C1A0A;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:.3s;pointer-events:none;z-index:999;max-width:320px}
.toast.show{opacity:1}
/* ── 部員名簿 ── */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.member-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:12px;box-shadow:var(--shadow);transition:.15s}
.member-card:hover{box-shadow:0 4px 16px rgba(92,61,17,.13);transform:translateY(-1px)}
.member-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;color:#fff}
.member-avatar.grade-1{background:#2E8B57}.member-avatar.grade-2{background:#2E60BF}
.member-avatar.grade-3{background:#D97706}.member-avatar.grade-顧問{background:#5C3D11}
.member-avatar.grade-OBOG{background:#7C3AED}
.member-info{flex:1;min-width:0}
.member-name{font-size:14px;font-weight:900;display:flex;align-items:center;gap:6px}
.member-kana{font-size:10px;color:var(--muted);margin-top:1px}
.member-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.member-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.member-tag.grade{background:var(--soba-mid);color:var(--soba)}
.member-tag.role-部長{background:#FEF3C7;color:#D97706}
.member-tag.role-副部長{background:#DBEAFE;color:#1E40AF}
.member-tag.role-顧問{background:var(--soba-mid);color:var(--soba)}
.member-tag.role-other{background:#F3F4F6;color:#374151}
.member-contact{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6}
.member-note{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic}
.member-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.member-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.mf-btn{padding:5px 13px;border-radius:14px;cursor:pointer;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:.15s;font-family:inherit}
.mf-btn.active{background:var(--soba);color:#fff;border-color:var(--soba)}
.member-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.mstat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;min-width:70px}
.mstat-num{font-size:20px;font-weight:900;color:var(--soba)}
.mstat-label{font-size:10px;color:var(--muted);margin-top:1px}

/* ── 不足・破損レポートボタン ── */
.report-fab{
  position:fixed;bottom:24px;right:24px;z-index:300;
  background:var(--red);color:#fff;border:none;border-radius:50px;
  padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 16px rgba(185,28,28,.4);
  display:flex;align-items:center;gap:7px;transition:.15s
}
.report-fab:hover{background:#991B1B;transform:translateY(-2px)}

/* ── 汎用ページ ── */
.page-screen{padding:20px 24px;max-width:900px}
.page-screen h2{font-size:18px;font-weight:900;color:var(--soba);margin-bottom:4px}
.page-screen .page-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* ── 役割分担 ── */
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.roster-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.roster-head{padding:9px 14px;font-size:13px;font-weight:900;display:flex;align-items:center;gap:7px}
.roster-head.sale{background:var(--sale-mid);color:var(--sale)}
.roster-head.inst{background:var(--inst-mid);color:var(--inst2)}
.roster-head.other{background:var(--other-mid);color:var(--other2)}
.roster-member-list{padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.roster-member{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;background:var(--bg)}
.roster-member-name{font-size:13px;font-weight:500;flex:1}
.roster-member-note{font-size:11px;color:var(--muted)}
.roster-add-row{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border)}
.roster-add-row input{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none}
.roster-add-row input:focus{border-color:var(--soba2)}
.roster-add-btn{background:var(--soba);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── 消耗品 ── */
.consumable-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.consumable-table th{background:var(--soba);color:#fff;padding:8px 12px;font-size:12px;font-weight:700;text-align:left}
.consumable-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.consumable-table tr:nth-child(even) td{background:#FAF7F2}
.consumable-table td input{border:1.5px solid var(--border);border-radius:5px;padding:4px 7px;font-size:12px;font-family:inherit;width:80px;text-align:center;outline:none}
.consumable-table td input:focus{border-color:var(--soba2)}
.con-avg{font-size:11px;color:var(--muted);margin-top:2px}
.con-trend{font-size:12px;font-weight:700}
.con-trend.up{color:var(--red)}.con-trend.down{color:var(--sale2)}.con-trend.same{color:var(--muted)}

/* ── 持出管理 ── */
.lending-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.lending-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.lending-card.returned{border-color:var(--sale2);background:var(--sale-light);opacity:.8}
.lc-icon{font-size:20px;flex-shrink:0}
.lc-info{flex:1;min-width:0}
.lc-name{font-size:14px;font-weight:700}
.lc-meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.6}
.lc-status{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;flex-shrink:0}
.lc-status.out{background:#FEF3C7;color:#D97706}
.lc-status.back{background:var(--sale-light);color:var(--sale)}
.lc-btns{display:flex;gap:5px}
.lc-btn{background:var(--soba-light);color:var(--soba2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.lc-btn.ret{background:var(--sale-light);color:var(--sale);border-color:var(--sale2)}
.lc-btn.del{background:#FEF2F2;color:var(--red);border-color:var(--red)}

/* ── 振り返り ── */
.review-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.review-section h3{font-size:14px;font-weight:900;color:var(--soba);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.star-row{display:flex;gap:4px;margin-bottom:8px}
.star{font-size:24px;cursor:pointer;transition:.1s;filter:grayscale(1);opacity:.4}
.star.active{filter:none;opacity:1}
.review-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:80px;line-height:1.7}
.review-textarea:focus{border-color:var(--soba2)}
.review-save-btn{background:var(--soba);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.review-history-item{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;line-height:1.7}
.review-history-item:last-child{border-bottom:none}
.review-ev-label{font-size:11px;font-weight:700;color:var(--soba2);margin-bottom:3px}

/* ── レポート一覧 ── */
.report-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;gap:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.report-card.high{border-color:#EF4444;background:#FEF2F2}
.report-card.mid{border-color:#F59E0B;background:#FFFBEB}
.report-card.low{border-color:var(--sale2);background:var(--sale-light)}
.report-card.resolved{opacity:.6;border-style:dashed}
.rp-body{flex:1;min-width:0}
.rp-name{font-size:13px;font-weight:700}
.rp-detail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
.rp-meta{font-size:11px;color:var(--muted);margin-top:4px}
.rp-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.rp-badge.shortage{background:#DBEAFE;color:#1E40AF}
.rp-badge.broken{background:#FCE7F3;color:#9D174D}
.rp-badge.lost{background:#FEF3C7;color:#92400E}
.rp-badge.other{background:#F3F4F6;color:#374151}
#pdf-area{position:fixed;left:-9999px;top:0;width:820px;background:#fff;z-index:-1}
</style>
</head>

<!-- report modal (不足・破損) -->

<script>
// ═══════════════════════════════════════════════
// MASTER DEFAULT DATA
// ═══════════════════════════════════════════════
const MASTER_DEFAULT = {
  sale:{
    全体:[
      {name:'看板・のぼり',qty:'2枚'},
      {name:'テーブルクロス',qty:'必要枚数'},

      {name:'エプロン',qty:'人数分'},

    ゆで:[

      {name:'カセットコンロ',qty:'2台'},
      {name:'ガスボンベ',qty:'予備含め6本'},
      {name:'ざる（ゆで上げ用）',qty:'4枚'},
      {name:'トング・菜箸',qty:'各2本'},
      {name:'水切りかご',qty:'2個'},
      {name:'バケツ（水用）',qty:'2個'},
      {name:'温度計',qty:'1本'},
      {name:'鍋つかみ',qty:'2組'},
    ],
    受付:[
      {name:'金銭トレー',qty:'2枚'},
      {name:'お釣り用小銭',qty:'十分な量'},
      {name:'料金表・メニュー板',qty:'1枚'},
      {name:'番号札',qty:'50枚以上'},
      {name:'ビニール袋（会計用）',qty:'50枚'},
      {name:'筆記用具',qty:'2セット'},
      {name:'領収書',qty:'1冊'},
    ],
    洗い:[
      {name:'洗い桶',qty:'4個'},
      {name:'食器用洗剤',qty:'2本'},
      {name:'スポンジ',qty:'4個'},
      {name:'給水タンク or ホース',qty:'1式'},
      {name:'乾燥用ラック',qty:'2個'},
      {name:'ペーパータオル',qty:'2ロール'},
    ],
    盛り付け:[
      {name:'そば器（ざる・お盆）',qty:'販売数分'},
      {name:'薬味容器（ネギ・わさび）',qty:'各2個'},
      {name:'つゆ容器',qty:'販売数＋予備'},
      {name:'菜箸',qty:'4本'},
      {name:'盛り付け用トング',qty:'2本'},
      {name:'つゆ計量カップ',qty:'1個'},
    ],
    整列:[
      {name:'案内看板（行列誘導）',qty:'2枚'},
      {name:'ロープ・コーン',qty:'1式'},
      {name:'椅子（待ち用）',qty:'数脚'},
      {name:'ハンドマイク',qty:'1個'},
    ],
  },
  inst:{
    指導:[
      {name:'のし板',qty:'人数分'},
      {name:'のし棒',qty:'人数分'},
      {name:'こね鉢',qty:'人数分'},
      {name:'包丁',qty:'人数分'},
      {name:'まな板（切り台）',qty:'人数分'},
      {name:'こま板',qty:'人数分'},
      {name:'スケッパー',qty:'人数分'},
      {name:'そば粉',qty:'計画量'},
      {name:'つなぎ粉（小麦粉）',qty:'計画量'},
      {name:'水（計量済み）',qty:'計画量'},

      {name:'打ち粉（片栗粉）',qty:'適量'},
      {name:'エプロン',qty:'参加者分'},
      {name:'三角巾・帽子',qty:'参加者分'},
      {name:'手順説明資料',qty:'参加者分'},
    ],
    持ち帰り:[
      {name:'持ち帰り袋',qty:'参加者分'},
      {name:'輪ゴム',qty:'多めに'},
      {name:'打ち粉（持ち帰り用）',qty:'小袋で'},
      {name:'調理説明カード',qty:'参加者分'},
      {name:'クーラーボックス',qty:'1個'},
    ],
  },
  other:{
    その他:[
      {name:'（ここに道具を追加してください）',qty:''},
    ],
  },
};

const TYPE_META = {
  sale: {label:'そば販売',    icon:'🍜', color:'sale', roles:['全体','ゆで','受付','洗い','盛り付け','整列']},
  inst: {label:'そば打ち指導', icon:'🌾', color:'inst', roles:['指導','持ち帰り']},
  other:{label:'その他',      icon:'📦', color:'other', roles:['その他']},
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = {events:{}, items:{}, checks:{}, approvals:{}, roster:{}, consumables:{}, lending:[], reports:[], reviews:{}, members:{}};
let currentEvent = null;
let currentType  = null;
let currentRole  = null;
let masterItems  = null;
let editTarget   = null;
let masterType   = 'sale';
let curScreen    = 'type';
let userName     = localStorage.getItem('soba-user') || '';

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
document.addEventListener('firebase-ready', ()=>{
  if(!userName) askName();  // 未設定の初回のみ
  loadLocal();
  if(window._firebaseReady) setupFb();
  updateSync();
  renderAll();
});

function loadLocal(){
  try {
    const s = localStorage.getItem('soba-st3');
    if(s){
      const parsed = JSON.parse(s);
      // 配列フィールドは直接代入、オブジェクトフィールドはマージ
      S.events     = parsed.events     || {};
      S.items      = parsed.items      || {};
      S.checks     = parsed.checks     || {};
      S.approvals  = parsed.approvals  || {};
      S.roster     = parsed.roster     || {};
      S.consumables= parsed.consumables|| {};
      S.lending    = Array.isArray(parsed.lending)  ? parsed.lending  : [];
      S.reports    = Array.isArray(parsed.reports)  ? parsed.reports  : [];
      S.reviews    = parsed.reviews    || {};
      S.members    = parsed.members    || {};
    }
    const m = localStorage.getItem('soba-master3');
    if(m){
      const saved = JSON.parse(m);
      // 保存済みデータに MASTER_DEFAULT の不足役割を補完する
      masterItems = deepClone(MASTER_DEFAULT);
      for(const type of ['sale','inst','other']){
        if(saved[type]){
          for(const role of Object.keys(saved[type])){
            masterItems[type][role] = saved[type][role]; // 保存済みを優先
          }
        }
      }
    } else {
      masterItems = deepClone(MASTER_DEFAULT);
    }
  } catch(e) { masterItems = deepClone(MASTER_DEFAULT); }
  for(const type of ['sale','inst','other']){
    if(masterItems[type]) TYPE_META[type].roles = Object.keys(masterItems[type]);
  }
  if(!Object.keys(S.events).length){
    const id = uid();
    S.events[id] = {name:'今庄そば祭り', date:todayStr(), memo:'', createdAt:Date.now()};
    S.items[id]  = buildFromMaster();
    S.checks[id] = {};
    currentEvent = id;
    saveLocal();
  } else {
    currentEvent = Object.keys(S.events).sort((a,b)=>S.events[b].createdAt-S.events[a].createdAt)[0];
  }
}
function saveLocal(){
  try {
    localStorage.setItem('soba-st3', JSON.stringify(S));
    localStorage.setItem('soba-master3', JSON.stringify(masterItems));
  } catch(e){}
}
// マスター専用の保存（ローカル＋Firebase）
function persistMaster(){
  localStorage.setItem('soba-master3', JSON.stringify(masterItems));
  if(window._firebaseReady&&window._db){
    window._fbSet(window._fbRef(window._db,'soba3/masterItems'), masterItems).catch(()=>{});
  }
}
function buildFromMaster(){
  const out={};
  for(const type of ['sale','inst','other']){
    out[type]={};
    for(const [role,arr] of Object.entries(masterItems[type]||{})){
      out[type][role]={};
      arr.forEach((it,i)=>{
        const id=`${type}_${role.replace(/\s/g,'')}_${i}_${Date.now()+i}`;
        out[type][role][id]={id,name:it.name,qty:it.qty};
      });
    }
  }
  return out;
}

// ═══════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════
function setupFb(){
  const db=window._db,r=window._fbRef,ov=window._fbOnValue;
  ov(r(db,'soba3'), snap=>{
    const d=snap.val();
    if(d){
      if(d.events)S.events=d.events; if(d.items)S.items=d.items;
      if(d.checks)S.checks=d.checks; if(d.approvals)S.approvals=d.approvals;
      if(d.roster)S.roster=d.roster; if(d.consumables)S.consumables=d.consumables;
      if(d.lending)S.lending=d.lending; if(d.reports)S.reports=d.reports;
      if(d.reviews)S.reviews=d.reviews; if(d.members)S.members=d.members;
      if(d.masterItems){ masterItems=d.masterItems; localStorage.setItem('soba-master3',JSON.stringify(masterItems)); }
      if(d.pdfHist){ localStorage.setItem('soba-pdf-hist3',JSON.stringify(d.pdfHist)); }
    }
    saveLocal(); renderAll(); updateSync(true);
  });
}
function persist(){
  saveLocal();
  if(window._firebaseReady&&window._db){
    window._fbSet(window._fbRef(window._db,'soba3/events'),S.events).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/items'),S.items).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/checks'),S.checks).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/approvals'),S.approvals).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/roster'),S.roster).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/consumables'),S.consumables).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/lending'),S.lending).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/reports'),S.reports).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/reviews'),S.reviews).catch(()=>{});
    window._fbSet(window._fbRef(window._db,'soba3/members'),S.members).catch(()=>{});
  }
  renderAll();
}
function updateSync(on){
  const d=document.getElementById('sdot'),l=document.getElementById('slabel');
  if(on){d.className='sdot on';l.textContent='同期中';}
  else if(window._firebaseReady){d.className='sdot';l.textContent='接続中';}
  else{d.className='sdot';l.textContent='ローカル';}
}

function deleteEvent(id){

// ═══════════════════════════════════════════════
// APPROVALS
// ═══════════════════════════════════════════════
// 承認ステップ定義（順序が重要）
const APV_STEPS = [
  {key:'role',     label:'担当確認',  icon:'👤', cls:'role-step',     btnCls:'role-btn'},
  {key:'captain',  label:'部長確認',  icon:'⭐', cls:'captain-step',  btnCls:'captain-btn'},
  {key:'advisor',  label:'顧問承認',  icon:'🎓', cls:'advisor-step',  btnCls:'advisor-btn'},
];

function getApv(type,role){
  return S.approvals?.[currentEvent]?.[type]?.[role] || {};
}
function setApv(type,role,key,data){
  if(!S.approvals) S.approvals={};
  if(!S.approvals[currentEvent]) S.approvals[currentEvent]={};
  if(!S.approvals[currentEvent][type]) S.approvals[currentEvent][type]={};
  if(!S.approvals[currentEvent][type][role]) S.approvals[currentEvent][type][role]={};
  S.approvals[currentEvent][type][role][key]=data;
  persist();
}
function revokeApv(type,role,key){
  // キャンセル時：そのステップ以降をすべてリセット
  const order=APV_STEPS.map(s=>s.key);
  const idx=order.indexOf(key);
  if(!S.approvals?.[currentEvent]?.[type]?.[role])return;
  for(let i=idx;i<order.length;i++) delete S.approvals[currentEvent][type][role][order[i]];
  persist();
}

function approve(type,role,key){
  const apv=getApv(type,role);
  const order=APV_STEPS.map(s=>s.key);
  const idx=order.indexOf(key);
  // 前のステップが完了しているか確認
  if(idx>0&&!apv[order[idx-1]]?.done){
    toast('前のステップを先に完了してください'); return;
  }
  // 全アイテムチェック確認（担当確認のみ）
  if(key==='role'){
    const roleItems=Object.values(S.items[currentEvent]?.[type]?.[role]||{});
    const checks=S.checks[currentEvent]||{};
    const allDone=roleItems.every(it=>checks[it.id]?.checked);
    if(!allDone&&roleItems.length>0){
      if(!confirm('未チェックの道具があります。それでも確認しますか？'))return;
    }
  }
  setApv(type,role,key,{done:true, by:userName, at:nowStr()});
  toast(`✅ ${APV_STEPS.find(s=>s.key===key).label}しました`);
}

// ── Screen: checklist ──
function renderCheckScreen(){
  const type=currentType,role=currentRole,tm=TYPE_META[type];
  const items=S.items[currentEvent]?.[type]||{};
  const checks=S.checks[currentEvent]||{};

  // ロールタブ
  const roleTabs=tm.roles.map(r=>{
    const ids=Object.keys(items[r]||{});
    const done=ids.filter(id=>checks[id]?.checked).length;
    const apv=S.approvals?.[currentEvent]?.[type]?.[r]||{};
    const apvBadge=apv.advisor?.done?'🎓':apv.captain?.done?'⭐':apv.role?.done?'👤':'';
    return `<div class="rtab${r===role?' active '+tm.color:''}" onclick="setRole('${r}')">
      ${apvBadge} ${r}<span class="rbadge">${done}/${ids.length}</span>
    </div>`;
  }).join('');

  // アイテムカード
  const roleItems=Object.values(items[role]||{});
  const total=roleItems.length, done=roleItems.filter(it=>checks[it.id]?.checked).length;
  const allChecked=(total>0&&done===total);
  const cards=roleItems.map(it=>{
    const c=checks[it.id];
    return `<div class="item-card${c?.checked?' checked '+tm.color:''}" onclick="toggleCheck('${it.id}')">
      <div class="item-chk">${c?.checked?'✓':''}</div>
      <div class="item-body">
        <div class="item-name">${esc(it.name)}</div>
        ${it.qty?`<div class="item-qty">📦 ${esc(it.qty)}</div>`:''}
        ${c?.checked&&c.by?`<div class="item-by">✓ ${esc(c.by)}　${c.at||''}</div>`:''}
      </div>
      <div class="item-acts">
        <button class="ia" onclick="event.stopPropagation();openEdit('${type}','${role}','${it.id}')" title="編集">✏️</button>
        <button class="ia" onclick="event.stopPropagation();deleteItem('${type}','${role}','${it.id}')" title="削除">🗑</button>
      </div>
    </div>`;
  }).join('');

  // 承認フロー
  const apv=getApv(type,role);
  const apvSteps=APV_STEPS.map((s,i)=>{
    const prev=i>0?APV_STEPS[i-1]:null;
    const prevDone=i===0||apv[prev.key]?.done;
    const thisDone=!!apv[s.key]?.done;
    const canAct=prevDone&&!thisDone;
    return `<div class="apv-step ${s.cls}${thisDone?' done':''}">
      <div class="apv-step-icon">${thisDone?'✅':s.icon}</div>
      <div class="apv-step-label">${s.label}</div>
      <div class="apv-step-info">${thisDone?(esc(apv[s.key].by)+'<br>'+esc(apv[s.key].at)):'—'}</div>
      ${thisDone
        ? `<button class="apv-btn revoke" onclick="revokeApv('${type}','${role}','${s.key}')">取消</button>`
        : `<button class="apv-btn ${s.btnCls}" onclick="approve('${type}','${role}','${s.key}')" ${canAct?'':'disabled'}>${canAct?s.label+'する':'待機中'}</button>`
      }
    </div>`;
  });
  const apvHTML=apvSteps.join('<div class="apv-arrow">›</div>');
  const advisorDone=!!apv.advisor?.done;

  document.getElementById('main').innerHTML=`
  <div class="check-screen">
    <div class="role-tabs">${roleTabs}</div>
    <div class="sec-bar ${tm.color}">
      <h3>${tm.icon} ${tm.label}　›　${role}</h3>

    <div class="add-row">

      <input class="qi" id="qi-${type}-${role}" placeholder="個数・メモ（任意）">
      <button class="add-btn" onclick="addItem('${type}','${role}')">＋ 追加</button>
    </div>
    <!-- 承認フロー -->
    <div class="apv-section">
      <div class="apv-title">
        🔏 確認・承認フロー　<span style="font-size:11px;color:var(--muted);font-weight:400">（${role}）</span>
        ${advisorDone?'<span style="margin-left:auto;background:#D97706;color:#fff;padding:2px 10px;border-radius:10px;font-size:11px">✅ 顧問承認済み</span>':''}
      </div>
      <div class="apv-flow">${apvHTML}</div>
      ${!allChecked&&!apv.role?.done?`<div class="apv-lock-msg">⚠️ 未チェックの道具が ${total-done} 件あります。すべてチェックしてから担当確認してください。</div>`:''}
    </div>
  </div>`;
}

async function exportPDF(){
  if(!currentEvent){toast('イベントを選択してください');return;}
  const btn=document.getElementById('pdf-btn');
  btn.textContent='⏳ 生成中...'; btn.disabled=true;
  const ev=S.events[currentEvent];
  const allItems=S.items[currentEvent]||{};
  const checks=S.checks[currentEvent]||{};
  let body='';
  const colorMap={sale:'#1A5E3A',inst:'#1A3E7C',other:'#5B21B6'};
  for(const [type,tm] of Object.entries(TYPE_META)){
    let typeSec='', typeTotal=0, typeDone=0;
    for(const role of Object.keys(allItems[type]||{})){
      const roleItems=Object.values(allItems[type][role]||{});
      if(!roleItems.length)continue;
      const done=roleItems.filter(it=>checks[it.id]?.checked).length;
      typeTotal+=roleItems.length; typeDone+=done;
      const rows=roleItems.map(it=>{
        const c=checks[it.id];
        return `<tr style="background:${c?.checked?'#EDF7F2':'#fff'}">
          <td style="padding:5px 8px;border:1px solid #DDD;font-size:11px">${esc(it.name)}</td>
          <td style="padding:5px 8px;border:1px solid #DDD;font-size:11px;color:#666">${esc(it.qty||'')}</td>
          <td style="padding:5px 8px;border:1px solid #DDD;text-align:center;font-size:12px;color:${colorMap[type]}">${c?.checked?'✓':''}</td>
          <td style="padding:5px 8px;border:1px solid #DDD;font-size:10px;color:#555">${c?.by?esc(c.by)+'　'+esc(c.at||''):''}</td>
        </tr>`;
      }).join('');
      typeSec+=`<div style="margin-bottom:14px">
        <div style="background:#F5F0E8;padding:5px 10px;border-left:4px solid ${colorMap[type]};font-size:12px;font-weight:700;margin-bottom:6px;border-radius:0 4px 4px 0">${role}　${done}/${roleItems.length}</div>
        <table style="width:100%;border-collapse:collapse">
          <tr style="background:#EDE8DF">
            <th style="padding:5px 8px;border:1px solid #CCC;text-align:left;font-size:11px;width:37%">道具名</th>
            <th style="padding:5px 8px;border:1px solid #CCC;text-align:left;font-size:11px;width:24%">個数・メモ</th>
            <th style="padding:5px 8px;border:1px solid #CCC;text-align:center;font-size:11px;width:10%">✓</th>
            <th style="padding:5px 8px;border:1px solid #CCC;text-align:left;font-size:11px;width:29%">担当者</th>
          </tr>${rows}
        </table>
        ${buildApvPdfHTML(type,role)}
      </div>`;
    }
    if(!typeSec)continue;
    body+=`<div style="margin-bottom:22px">
      <div style="background:${colorMap[type]};color:#fff;padding:8px 14px;border-radius:6px 6px 0 0;font-size:14px;font-weight:900;display:flex;justify-content:space-between">
        <span>${tm.icon} ${tm.label}</span><span>${typeDone}/${typeTotal}</span>
      </div>
      <div style="border:1px solid #CCC;border-top:none;border-radius:0 0 6px 6px;padding:14px">${typeSec}</div>
    </div>`;
  }
  const area=document.getElementById('pdf-area');
  area.innerHTML=`<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}</style>
  <div style="padding:36px 44px;background:#fff;width:820px">
    <div style="text-align:center;margin-bottom:20px;border-bottom:3px solid #5C3D11;padding-bottom:14px">
      <h1 style="font-size:20px;font-weight:900;color:#5C3D11;letter-spacing:.08em">そば部　道具チェックリスト</h1>
      <p style="font-size:12px;color:#666;margin-top:4px">啓新高等学校 そば部　｜　${esc(ev.name)}　${esc(ev.date||'')}　｜　出力：${nowStr()}</p>
    </div>
    ${body}
  </div>`;
  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,500));
  try{
    const canvas=await html2canvas(area,{scale:2,useCORS:true,backgroundColor:'#fff',width:820,windowWidth:820,logging:false});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    const fullH=canvas.height*pw/canvas.width;
    let y=0,page=0;
    while(y<fullH){
      if(page>0)pdf.addPage();
      const srcY=y/fullH*canvas.height;
      const sliceH=Math.min(ph/fullH*canvas.height, canvas.height-srcY);
      const sc=document.createElement('canvas');
      sc.width=canvas.width; sc.height=Math.round(sliceH);
      sc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,sliceH,0,0,canvas.width,sliceH);
      pdf.addImage(sc.toDataURL('image/jpeg',.96),'JPEG',0,0,pw,ph);
      y+=ph; page++;
    }
    const fname=`そば部チェックリスト_${ev.name}_${(ev.date||todayStr()).replace(/-/g,'')}.pdf`;
    pdf.save(fname);
    savePdfHist({filename:fname, event:ev.name, savedAt:nowStr()});
    toast('✅ PDFを保存しました',3000);
  }catch(e){console.error(e);alert('PDF生成エラー:\n'+e.message);}
  btn.textContent='📥 PDF保存'; btn.disabled=false;
  area.innerHTML='';
}

// PDF履歴を localStorage + Firebase に保存する共通ヘルパー
function savePdfHist(entry){
  const hist=JSON.parse(localStorage.getItem('soba-pdf-hist3')||'[]');
  hist.unshift(entry);
  if(hist.length>50)hist.pop();
  localStorage.setItem('soba-pdf-hist3',JSON.stringify(hist));
  if(window._firebaseReady&&window._db){
    window._fbSet(window._fbRef(window._db,'soba3/pdfHist'),hist).catch(()=>{});
  }
}

function removeRosterMember(key,idx){

function clearRoster(){

async function exportRosterPDF(){
  const ev=S.events[currentEvent];
  const roster=S.roster[currentEvent]||{};
  let rows='';
  for(const [type,tm] of Object.entries(TYPE_META)){
    for(const role of tm.roles){
      const key=`${type}_${role}`;
      const members=roster[key]||[];
      const colorMap={sale:'#1A5E3A',inst:'#1A3E7C',other:'#5B21B6'};
      rows+=`<tr>
        <td style="padding:6px 10px;border:1px solid #CCC;font-size:11px;font-weight:700;color:${colorMap[type]};white-space:nowrap">${tm.icon} ${tm.label}</td>
        <td style="padding:6px 10px;border:1px solid #CCC;font-size:11px;font-weight:700">${role}</td>
        <td style="padding:6px 10px;border:1px solid #CCC;font-size:12px">${members.map(m=>esc(m.name)+(m.note?`（${esc(m.note)}）`:'')).join('　')||'—'}</td>
      </tr>`;
    }
  }
  const area=document.getElementById('pdf-area');
  area.innerHTML=`<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');*{box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}</style>
  <div style="padding:36px 44px;background:#fff;width:820px">
    <h1 style="font-size:20px;font-weight:900;color:#5C3D11;text-align:center;margin-bottom:4px">そば部 当日役割分担表</h1>
    <p style="text-align:center;font-size:12px;color:#666;margin-bottom:20px">${esc(ev.name)} ${ev.date||''}　｜　作成：${nowStr()}</p>
    <table style="width:100%;border-collapse:collapse">
      <tr style="background:#5C3D11;color:#fff">
        <th style="padding:6px 10px;font-size:11px;text-align:left;width:20%">種別</th>
        <th style="padding:6px 10px;font-size:11px;text-align:left;width:15%">役割</th>
        <th style="padding:6px 10px;font-size:11px;text-align:left">担当者</th>
      </tr>${rows}
    </table>
  </div>`;
  await document.fonts.ready; await new Promise(r=>setTimeout(r,400));
  try{
    const canvas=await html2canvas(area,{scale:2,useCORS:true,backgroundColor:'#fff',width:820,windowWidth:820,logging:false});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    const fullH=canvas.height*pw/canvas.width;
    let y=0,page=0;
    while(y<fullH){
      if(page>0)pdf.addPage();
      const srcY=y/fullH*canvas.height;
      const sliceH=Math.min(ph/fullH*canvas.height, canvas.height-srcY);
      const sc=document.createElement('canvas');
      sc.width=canvas.width; sc.height=Math.round(sliceH);
      sc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,sliceH,0,0,canvas.width,sliceH);
      pdf.addImage(sc.toDataURL('image/jpeg',.96),'JPEG',0,0,pw,ph);
      y+=ph; page++;
    }
    const rfname=`役割分担表_${ev.name}_${(ev.date||todayStr()).replace(/-/g,'')}.pdf`;
    pdf.save(rfname);
    savePdfHist({filename:rfname, event:ev.name, savedAt:nowStr()});
    toast('✅ 役割分担表PDFを保存しました');
  }catch(e){alert('PDF生成エラー:'+e.message);}
  area.innerHTML='';
}

// ═══════════════════════════════════════════════
const DEFAULT_CONSUMABLES=[
  {name:'ガスボンベ',unit:'本'},
  {name:'食器用洗剤',unit:'本'},
  {name:'スポンジ',unit:'個'},
  {name:'ゴミ袋',unit:'枚'},
  {name:'ペーパータオル',unit:'ロール'},
  {name:'ビニール袋（会計用）',unit:'枚'},
  {name:'そば粉',unit:'kg'},
];
function renderConsumableScreen(){
  if(!currentEvent){ document.getElementById('main').innerHTML=noEvMsg(); return; }
  const ev=S.events[currentEvent];
  if(!S.consumables[currentEvent]) S.consumables[currentEvent]={};
  const cur=S.consumables[currentEvent];
  // 全イベントの同品目履歴を集計
  const allEvIds=Object.keys(S.events).sort((a,b)=>S.events[a].createdAt-S.events[b].createdAt);
  // マスター消耗品リスト（イベントに入力があるものも含む）
  const names=new Set(DEFAULT_CONSUMABLES.map(c=>c.name));
  Object.values(S.consumables).forEach(evC=>Object.keys(evC).forEach(n=>names.add(n)));

  let tableRows='';
  for(const name of names){
    const unit=DEFAULT_CONSUMABLES.find(c=>c.name===name)?.unit||'個';
    const curVal=cur[name]?.used||'';
    // 過去の履歴を集計して平均・トレンドを計算
    const history=allEvIds.map(eid=>({ev:S.events[eid]?.name,val:parseFloat(S.consumables[eid]?.[name]?.used)||null})).filter(h=>h.val!==null&&h.ev!==ev.name);
    const avg=history.length?Math.round(history.reduce((s,h)=>s+h.val,0)/history.length*10)/10:null;
    let trend='',trendCls='same';
    if(avg!==null&&curVal!==''){const v=parseFloat(curVal);if(v>avg){trend='▲';trendCls='up';}else if(v<avg){trend='▼';trendCls='down';}}
    const histTxt=history.slice(-3).map(h=>`${h.ev}:${h.val}${unit}`).join(' / ');
    tableRows+=`<tr>
      <td style="font-weight:700">${esc(name)}</td>
      <td><input type="number" min="0" value="${curVal}" placeholder="0" onchange="saveConsumable('${name}',this.value)">　${unit}</td>
      <td>${avg!==null?`平均 ${avg}${unit}`:'-'}</td>
      <td><span class="con-trend ${trendCls}">${trend}</span></td>
      <td style="font-size:11px;color:var(--muted)">${histTxt||'-'}</td>
    </tr>`;
  }

  document.getElementById('main').innerHTML=`
  <div class="page-screen">
    <h2>📦 消耗品消費ペース記録</h2>
    <p class="page-sub">${esc(ev.name)} ${ev.date||''}</p>
    <table class="consumable-table">
      <tr>
        <th style="width:20%">品名</th><th style="width:18%">今回使用量</th>
        <th style="width:15%">過去平均</th><th style="width:8%">比較</th>
        <th>過去3回の実績</th>
      </tr>${tableRows}
    </table>
    <div class="add-row" style="max-width:500px">
      <input class="ni" id="con-new-name" placeholder="消耗品名を追加">
      <input class="qi" id="con-new-unit" placeholder="単位（例：本）" style="width:100px">
      <button class="add-btn" onclick="addConsumableItem()">＋ 追加</button>
    </div>
  </div>`;
}
function saveConsumable(name,val){
  if(!S.consumables[currentEvent]) S.consumables[currentEvent]={};
  S.consumables[currentEvent][name]={used:val, at:nowStr()};
  persist();
}
function addConsumableItem(){
  const name=document.getElementById('con-new-name')?.value.trim();
  if(!name)return;
  if(!S.consumables[currentEvent]) S.consumables[currentEvent]={};
  S.consumables[currentEvent][name]={used:'',at:''};
  persist(); renderConsumableScreen();
}

function saveLending(){
  const name=document.getElementById('lend-name').value.trim();

  const entry={
    id:uid(),name,qty:document.getElementById('lend-qty').value.trim(),
    person:document.getElementById('lend-person').value.trim(),
    date:document.getElementById('lend-date').value,
    memo:document.getElementById('lend-memo').value.trim(),
    returned:false,returnedAt:'',createdAt:Date.now()
  };

  S.lending.unshift(entry);

function returnLending(i){
  if(!S.lending[i])return;
  S.lending[i].returned=true;

function deleteLending(i){

  S.lending.splice(i,1);

}

}
function deleteReport(i){
  if(!confirm('この報告を削除しますか？'))return;
  S.reports.splice(i,1);
  persist();
}

// ── FAB（不足・破損ボタン）─ チェック画面のみ表示 ──
function updateFAB(){
  let fab=document.getElementById('report-fab');
  if(curScreen==='check'){
    if(!fab){
      fab=document.createElement('button');
      fab.id='report-fab';
      fab.className='report-fab';
      fab.innerHTML='⚠️ 不足・破損を報告';
      fab.onclick=()=>openModal('report-modal');
      document.body.appendChild(fab);
    }
    fab.style.display='';
  } else {
    if(fab) fab.style.display='none';
  }
}

// ═══════════════════════════════════════════════
// 部員名簿
// ═══════════════════════════════════════════════
let memberFilter = 'all';   // 'all' | '1年' | '2年' | '3年' | '顧問' | 'OB/OG'
let memberEditId = null;

const GRADE_COLOR = {'1年':'#2E8B57','2年':'#2E60BF','3年':'#D97706','顧問':'#5C3D11','OB/OG':'#7C3AED'};

function renderMembersScreen(){
  if(!S.members) S.members={};
  const all = Object.values(S.members).sort((a,b)=>{
    const gradeOrder={'1年':1,'2年':2,'3年':3,'顧問':4,'OB/OG':5};
    const gd = (gradeOrder[a.grade]||9) - (gradeOrder[b.grade]||9);
    if(gd!==0) return gd;
    const roleOrder={'部長':1,'副部長':2,'会計':3,'記録':4,'顧問':5,'部員':9};
    return (roleOrder[a.role]||8) - (roleOrder[b.role]||8);
  });
  const filtered = memberFilter==='all' ? all : all.filter(m=>m.grade===memberFilter);

  // 統計
  const total = all.length;
  const byGrade = {};
  all.forEach(m=>{ byGrade[m.grade]=(byGrade[m.grade]||0)+1; });
  const statsHTML = `
    <div class="member-stats">
      <div class="mstat"><div class="mstat-num">${total}</div><div class="mstat-label">総部員数</div></div>
      ${Object.entries(byGrade).map(([g,n])=>`<div class="mstat"><div class="mstat-num" style="color:${GRADE_COLOR[g]||'var(--soba)'}">${n}</div><div class="mstat-label">${g}</div></div>`).join('')}
    </div>`;

  // フィルタバー
  const grades = ['all','1年','2年','3年','顧問','OB/OG'];
  const filterBar = `<div class="member-filter-bar">
    ${grades.map(g=>`<button class="mf-btn${memberFilter===g?' active':''}" onclick="setMemberFilter('${g}')">${g==='all'?'全員':g}</button>`).join('')}
    <button class="mf-btn" onclick="exportMemberPDF()" style="margin-left:auto">📥 名簿PDF</button>
  </div>`;

  // カード
  const cards = filtered.map(m=>{
    const initials = (m.name||'?').replace(/\s/g,'').slice(-1);
    const gc = GRADE_COLOR[m.grade]||'#888';
    const gradeNum = m.grade?.replace('年','') || m.grade || '?';
    const roleTag = m.role ? `<span class="member-tag role-${['部長','副部長','顧問'].includes(m.role)?m.role:'other'}">${m.role}</span>` : '';
    const gradeTag = m.grade ? `<span class="member-tag grade">${m.grade}</span>` : '';
    return `<div class="member-card">
      <div class="member-avatar grade-${m.grade?.replace('/','')}" style="background:${gc}">${initials}</div>
      <div class="member-info">
        <div class="member-name">${esc(m.name||'')}${roleTag}</div>
        <div class="member-kana">${esc(m.kana||'')}</div>
        <div class="member-meta">${gradeTag}</div>
        ${m.contact||m.email?`<div class="member-contact">${m.contact?'📱 '+esc(m.contact)+'<br>':''}${m.email?'✉️ '+esc(m.email):''}</div>`:''}
        ${m.note?`<div class="member-note">💬 ${esc(m.note)}</div>`:''}
      </div>
      <div class="member-acts">
        <button class="ia" onclick="openEditMember('${m.id}')" title="編集">✏️</button>
        <button class="ia" onclick="deleteMember('${m.id}')" title="削除">🗑</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
  <div class="page-screen" style="max-width:1000px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
      <h2 style="margin-bottom:0">👥 部員名簿</h2>
      <button onclick="openAddMember()" style="background:var(--soba);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px">＋ 部員を追加</button>
    </div>
    <p class="page-sub">全イベント共通の名簿です</p>
    ${statsHTML}
    ${filterBar}
    <div class="member-grid">${cards||`<p style="color:var(--muted);font-size:14px;padding:20px 0">部員が登録されていません。「＋ 部員を追加」から登録してください。</p>`}</div>
  </div>`;
}

function setMemberFilter(g){ memberFilter=g; renderMembersScreen(); }

function openAddMember(){
  memberEditId=null;
  document.getElementById('mm-title').textContent='👤 部員を登録';
  ['mm-name','mm-kana','mm-contact','mm-email','mm-note'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('mm-grade').value='1年';
  document.getElementById('mm-role').value='部員';
  openModal('member-modal');
}

function openEditMember(id){
  const m = S.members[id];
  if(!m) return;
  memberEditId = id;
  document.getElementById('mm-title').textContent='✏️ 部員を編集';
  document.getElementById('mm-name').value    = m.name    || '';
  document.getElementById('mm-kana').value    = m.kana    || '';
  document.getElementById('mm-grade').value   = m.grade   || '1年';
  document.getElementById('mm-role').value    = m.role    || '部員';
  document.getElementById('mm-contact').value = m.contact || '';
  document.getElementById('mm-email').value   = m.email   || '';
  document.getElementById('mm-note').value    = m.note    || '';
  openModal('member-modal');
}

function saveMember(){
  const name = document.getElementById('mm-name').value.trim();
  if(!name){ toast('氏名を入力してください'); return; }
  if(!S.members) S.members={};
  const id = memberEditId || uid();
  S.members[id] = {
    id,
    name,
    kana:    document.getElementById('mm-kana').value.trim(),
    grade:   document.getElementById('mm-grade').value,
    role:    document.getElementById('mm-role').value,
    contact: document.getElementById('mm-contact').value.trim(),
    email:   document.getElementById('mm-email').value.trim(),
    note:    document.getElementById('mm-note').value.trim(),
    updatedAt: nowStr(),
  };
  closeModal('member-modal');
  persist();
  toast(memberEditId ? '✅ 部員情報を更新しました' : `✅ ${name} を登録しました`);
  memberEditId = null;
}

function deleteMember(id){
  const m = S.members[id];
  if(!confirm(`「${m?.name}」を名簿から削除しますか？`)) return;
  delete S.members[id];
  persist();
  toast('削除しました');
}

async function exportMemberPDF(){
  const all = Object.values(S.members||{}).sort((a,b)=>{
    const go={'1年':1,'2年':2,'3年':3,'顧問':4,'OB/OG':5};
    return (go[a.grade]||9)-(go[b.grade]||9) || (a.name||'').localeCompare(b.name||'');
  });
  if(!all.length){ toast('部員が登録されていません'); return; }

  const rows = all.map((m,i)=>`<tr style="background:${i%2?'#FAF7F2':'#fff'}">
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:12px;font-weight:700">${esc(m.name||'')}</td>
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:11px;color:#555">${esc(m.kana||'')}</td>
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:12px;text-align:center;color:${GRADE_COLOR[m.grade]||'#333'};font-weight:700">${esc(m.grade||'')}</td>
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:12px;text-align:center">${esc(m.role||'')}</td>
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:11px;color:#555">${esc(m.contact||'')}${m.email?'<br>'+esc(m.email):''}</td>
    <td style="padding:6px 10px;border:1px solid #DDD;font-size:11px;color:#555">${esc(m.note||'')}</td>
  </tr>`).join('');

  const area = document.getElementById('pdf-area');
  area.innerHTML=`<style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  *{box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}</style>
  <div style="padding:32px 40px;background:#fff;width:820px">
    <div style="text-align:center;border-bottom:3px solid #5C3D11;padding-bottom:12px;margin-bottom:18px">
      <h1 style="font-size:20px;font-weight:900;color:#5C3D11">そば部　部員名簿</h1>
      <p style="font-size:12px;color:#666;margin-top:4px">啓新高等学校 そば部　｜　${all.length}名　｜　作成：${nowStr()}</p>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <tr style="background:#5C3D11;color:#fff">
        <th style="padding:6px 10px;font-size:11px;text-align:left;width:18%">氏名</th>
        <th style="padding:6px 10px;font-size:11px;text-align:left;width:17%">よみがな</th>
        <th style="padding:6px 10px;font-size:11px;text-align:center;width:10%">学年</th>
        <th style="padding:6px 10px;font-size:11px;text-align:center;width:10%">役職</th>
        <th style="padding:6px 10px;font-size:11px;text-align:left;width:23%">連絡先</th>
        <th style="padding:6px 10px;font-size:11px;text-align:left">備考</th>
      </tr>${rows}
    </table>
  </div>`;

  await document.fonts.ready;
  await new Promise(r=>setTimeout(r,400));
  try{
    const canvas=await html2canvas(area,{scale:2,useCORS:true,backgroundColor:'#fff',width:820,windowWidth:820,logging:false});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    const fullH=canvas.height*pw/canvas.width;
    let y=0,page=0;
    while(y<fullH){
      if(page>0) pdf.addPage();
      const srcY=y/fullH*canvas.height;
      const sliceH=Math.min(ph/fullH*canvas.height, canvas.height-srcY);
      const sc=document.createElement('canvas');
      sc.width=canvas.width; sc.height=Math.round(sliceH);
      sc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,sliceH,0,0,canvas.width,sliceH);
      pdf.addImage(sc.toDataURL('image/jpeg',.96),'JPEG',0,0,pw,ph);
      y+=ph; page++;
    }
    const mfname=`そば部_部員名簿_${todayStr().replace(/-/g,'')}.pdf`;
    pdf.save(mfname);
    savePdfHist({filename:mfname, event:'部員名簿', savedAt:nowStr()});
    toast('✅ 名簿PDFを保存しました',3000);
  }catch(e){ alert('PDF生成エラー:\n'+e.message); }
  area.innerHTML='';
}

// ─── noEvMsg helper ───
function noEvMsg(){ return '<div style="padding:40px;color:var(--muted);font-size:14px;text-align:center">左のパネルからイベントを選択してください。</div>'; }


function buildApvPdfHTML(type,role){
  const apv=S.approvals?.[currentEvent]?.[type]?.[role]||{};
  const colorMap={role:'#1A5E3A',captain:'#1A3E7C',advisor:'#D97706'};
  const cells=APV_STEPS.map(s=>{
    const a=apv[s.key];
    const done=!!a?.done;
    const bg=done?({role:'#EDF7F2',captain:'#EEF3FB',advisor:'#FFF7E6'}[s.key]):'#fff';
    return `<td style="border:1px solid #CCC;padding:8px 10px;width:33%;vertical-align:top;background:${bg}">
      <div style="font-size:10px;font-weight:700;color:${colorMap[s.key]};margin-bottom:4px">${s.icon} ${s.label}</div>
      <div style="font-size:11px;color:#333;min-height:18px">${done?esc(a.by):''}</div>
      <div style="font-size:10px;color:#666;margin-top:2px">${done?esc(a.at):''}</div>
      <div style="border-top:1px solid #DDD;margin-top:8px;padding-top:4px;font-size:10px;color:#999">${done?'確認済み ✅':'（未確認）'}</div>
    </td>`;
  }).join('');
  return `<table style="width:100%;border-collapse:collapse;margin-top:8px">
    <tr style="background:#F5F0E8">
      <th colspan="3" style="padding:5px 8px;border:1px solid #CCC;text-align:left;font-size:11px;font-weight:700;color:#5C3D11">🔏 確認・承認欄</th>
    </tr>
    <tr>${cells}</tr>
  </table>`;
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function z(n){return String(n).padStart(2,'0')}
function nowStr(){const d=new Date();return `${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}`}
function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,7)}
function deepClone(o){return JSON.parse(JSON.stringify(o))}
