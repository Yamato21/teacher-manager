<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="写真アルバム">
<title>クラス写真アルバム</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Dela+Gothic+One&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#f5f3ef;--surface:#fff;--surface2:#eceae4;--border:#ddd8ce;--text:#252017;--text-sub:#7a7264;--accent:#2563eb;--accent-soft:#eff4ff;--green:#16a34a;--green-soft:#edfcf2;--orange:#d97706;--orange-soft:#fef9ec;--red:#dc2626;--radius:12px;--shadow:0 2px 14px rgba(37,32,23,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:.8rem}
.header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;flex-wrap:wrap;gap:.5rem}
.header h1{font-family:'Dela Gothic One',sans-serif;font-size:clamp(1rem,3vw,1.3rem)}
.header-r{display:flex;gap:.4rem;flex-wrap:wrap}
.btn{padding:.4rem .9rem;border:none;border-radius:8px;font:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s}.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}.btn-o{background:var(--orange);color:#fff}
.btn-ghost{background:none;border:1.5px solid var(--border);color:var(--text-sub)}.btn-ghost:hover{border-color:var(--text-sub)}
.btn-sm{padding:.25rem .55rem;font-size:.7rem}
.card{background:var(--surface);border-radius:var(--radius);padding:1rem;margin-bottom:.7rem;border:1px solid var(--border);box-shadow:var(--shadow)}
.ev-bar{display:flex;gap:4px;overflow-x:auto;padding:.5rem 0;-webkit-overflow-scrolling:touch}.ev-bar::-webkit-scrollbar{height:0}
.ev-chip{padding:.35rem .8rem;border-radius:99px;font-size:.75rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);transition:all .15s;flex-shrink:0}
.ev-chip:hover{border-color:var(--text-sub)}.ev-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ev-chip .ev-cnt{font-size:.6rem;opacity:.7;margin-left:3px}
.upload-card{border:2px dashed var(--accent);background:var(--accent-soft);text-align:center;padding:1.5rem;cursor:pointer;transition:all .15s}
.upload-card:hover{border-color:#7c3aed;background:rgba(124,58,237,.06)}
.upload-card.dragging{border-color:var(--green);background:var(--green-soft)}
.upload-ev{display:flex;gap:.3rem;align-items:center;justify-content:center;margin-top:.5rem;flex-wrap:wrap}
.upload-ev select,.upload-ev input{padding:.3rem .5rem;border:1px solid var(--border);border-radius:7px;font:inherit;font-size:.78rem}
.upload-prog{margin-top:.5rem;display:none}
.prog-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.prog-txt{font-size:.7rem;color:var(--text-sub);margin-top:.2rem}
.manage-bar{display:flex;gap:.3rem;align-items:center;flex-wrap:wrap;padding:.4rem 0;margin-bottom:.3rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
@media(min-width:600px){.photo-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}}
.photo-card{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--surface2);transition:all .15s}
.photo-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block}
.photo-overlay{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.55))}
.photo-ev-tag{font-size:.55rem;padding:1px 5px;border-radius:99px;background:rgba(37,99,235,.85);color:#fff;font-weight:700}
.photo-stud-tag{font-size:.55rem;padding:1px 5px;border-radius:99px;background:rgba(255,255,255,.85);color:#333;font-weight:600}
.photo-new{position:absolute;top:5px;right:5px;font-size:.55rem;padding:1px 5px;border-radius:99px;background:var(--green);color:#fff;font-weight:700}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.lb.open{display:flex}
.lb-img{max-width:92vw;max-height:70vh;object-fit:contain;border-radius:8px}
.lb-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer;z-index:10}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:1.8rem;cursor:pointer;padding:.4rem .8rem;border-radius:8px}
.lb-nav:hover{background:rgba(255,255,255,.25)}.lb-prev{left:10px}.lb-next{right:10px}
.lb-info{color:#fff;margin-top:8px;text-align:center;font-size:.82rem}
.lb-tags{display:flex;gap:4px;justify-content:center;margin-top:5px;flex-wrap:wrap}
.lb-tag{font-size:.68rem;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.15);color:#fff}
.lb-actions{display:flex;gap:.4rem;margin-top:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.2rem;max-width:420px;width:92%;max-height:80vh;overflow-y:auto}
.stud-wrap{display:flex;flex-wrap:wrap;gap:3px}
.stud-opt{padding:3px 8px;border-radius:99px;font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);transition:all .12s}
.stud-opt:hover{border-color:var(--accent)}.stud-opt.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{text-align:center;padding:30px 14px;color:var(--text-sub);font-size:.85rem}.empty-i{font-size:2.5rem;margin-bottom:6px}
.toast{position:fixed;top:12px;right:12px;background:var(--surface);border:2px solid var(--green);border-radius:var(--radius);padding:10px 14px;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:300;font-size:.82rem;font-weight:600;animation:si .25s ease}
@keyframes si{from{transform:translateX(200px);opacity:0}to{transform:translateX(0);opacity:1}}
@media print{.header-r,.ev-bar,.upload-card,.manage-bar,.btn,.lb,.modal-bg,.setup,.toast{display:none!important}.photo-grid{grid-template-columns:repeat(4,1fr)!important;gap:3px!important}body{background:#fff!important}}
</style>
</head>
<body>
<div class="app">
  <div class="header"><h1>📷 クラス写真アルバム</h1><div class="header-r">
    <button class="btn btn-p btn-sm" onclick="openUpload()">📤 写真を追加</button>
    <button class="btn btn-ghost btn-sm" onclick="fetchPhotos()">🔄</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleManage()">🔧</button>
  </div></div>
  <div class="ev-bar" id="evBar"></div>
  <div class="card upload-card" id="uploadCard" style="display:none" ondragover="event.preventDefault();this.classList.add('dragging')" ondragleave="this.classList.remove('dragging')" ondrop="handleDrop(event)" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:2rem">📸</div>
    <div style="font-size:.82rem;color:var(--text-sub)">タップして写真を選択 または ドラッグ＆ドロップ</div>
    <div class="upload-ev"><select id="uploadEv"><option value="">行事を選択</option></select><input type="text" id="uploadEvNew" placeholder="新しい行事名" style="width:120px" onclick="event.stopPropagation()"></div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    <div class="upload-prog" id="uploadProg"><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div><div class="prog-txt" id="progTxt"></div></div>
  </div>
  <div class="manage-bar" id="manageBar" style="display:none">
    <button class="btn btn-ghost btn-sm" onclick="openStudMgr()">👤 名簿</button>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨 印刷</button>
    <span style="font-size:.7rem;color:var(--text-sub);margin-left:auto" id="pcLabel">0枚</span>
  </div>
  <div class="photo-grid" id="photoGrid"><div class="empty"><div class="empty-i">📷</div>写真がありません</div></div>
</div>
<div class="lb" id="lb"><button class="lb-close" onclick="closeLB()">✕</button><button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button><button class="lb-nav lb-next" onclick="lbNav(1)">›</button><img class="lb-img" id="lbImg"><div class="lb-info" id="lbInfo"></div><div class="lb-tags" id="lbTags"></div><div class="lb-actions"><button class="btn btn-ghost btn-sm" onclick="openTagModal()" style="color:#fff;border-color:rgba(255,255,255,.3)">👤 タグ付け</button></div></div>
<div class="modal-bg" id="tagModal"><div class="modal"><h3 style="font-size:.9rem;margin-bottom:.6rem">👤 この写真に写っている人</h3><div class="stud-wrap" id="tagStudList"></div><div style="display:flex;gap:.3rem;margin-top:.6rem"><button class="btn btn-g" onclick="saveTagModal()">保存</button><button class="btn btn-ghost" onclick="closeTagModal()">閉じる</button></div></div></div>
<div class="modal-bg" id="studModal"><div class="modal"><h3 style="font-size:.9rem;margin-bottom:.5rem">👤 メンバー名簿</h3><p style="font-size:.7rem;color:var(--text-sub);margin-bottom:.3rem">1行に1人</p><textarea id="studInput" style="width:100%;height:120px;border:1px solid var(--border);border-radius:8px;padding:.5rem;font:inherit;font-size:.78rem;resize:vertical"></textarea><div style="display:flex;gap:.3rem;margin-top:.4rem"><button class="btn btn-g" onclick="saveStudents()">保存</button><button class="btn btn-ghost" onclick="document.getElementById('studModal').classList.remove('open')">閉じる</button></div></div></div>

<script>
const fbApp=firebase.initializeApp({apiKey:"AIzaSyBxGsHCgVOsMR3eYfHPsmq5OPOBcFMpHQQ",authDomain:"teacher-manager-d4623.firebaseapp.com",databaseURL:"https://teacher-manager-d4623-default-rtdb.firebaseio.com",projectId:"teacher-manager-d4623"},'photo-album');
const db=firebase.database(fbApp),dbRef=db.ref('photo-album');

let gasUrl='https://script.google.com/macros/s/AKfycbxe67nacD3Wn2yp3pvt7RCEFQpf96rotYSek7pDVCr2gxZQMbizF17DT5PZ923sndAn2Q/exec',folderId='1LCZNreQ5lnb5RU_-6F2gBndvMVgvPI3p',photos=[],meta={},events=[],students=[],currentEv='all',lbIdx=0,tagPhotoId=null,tagSel=new Set();

function init(){
  dbRef.on('value',snap=>{const d=snap.val();if(d){meta=d.meta||{};if(d.events)events=d.events;if(d.students)students=d.students;}renderEvents();renderPhotos();updateEvSel();});
  fetchPhotos();
}
function saveMeta(){dbRef.set({meta,events,students}).catch(e=>console.warn(e));}

function toggleManage(){const el=document.getElementById('manageBar');el.style.display=el.style.display==='none'?'flex':'none';}

async function fetchPhotos(){
  if(!gasUrl||!folderId)return;
  document.getElementById('photoGrid').innerHTML='<div class="empty"><div class="empty-i">⏳</div>読み込み中...</div>';
  try{const res=await fetch(gasUrl+'?action=list&folderId='+encodeURIComponent(folderId));const d=await res.json();if(d.error)throw new Error(d.error);
  photos=(d.files||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  photos.forEach(p=>{if(p.folder&&!events.includes(p.folder))events.push(p.folder);if(!meta[p.id])meta[p.id]={students:[],event:p.folder||''};else if(!meta[p.id].event)meta[p.id].event=p.folder||'';});
  saveMeta();renderEvents();renderPhotos();document.getElementById('pcLabel').textContent=photos.length+'枚';
  }catch(e){document.getElementById('photoGrid').innerHTML='<div class="empty"><div class="empty-i">⚠️</div>'+esc(e.message)+'</div>';}
}

function openUpload(){const el=document.getElementById('uploadCard');el.style.display=el.style.display==='none'?'block':'none';updateEvSel();}
function handleDrop(e){e.preventDefault();document.getElementById('uploadCard').classList.remove('dragging');handleFiles(e.dataTransfer.files);}
async function handleFiles(files){
  if(!files||!files.length)return;if(!gasUrl||!folderId)return alert('先にGAS設定をしてください');
  const evSel=document.getElementById('uploadEv').value,evNew=document.getElementById('uploadEvNew').value.trim(),sub=evNew||evSel||'';
  const prog=document.getElementById('uploadProg');prog.style.display='block';let done=0;
  for(const file of files){if(!file.type.startsWith('image/'))continue;
    document.getElementById('progTxt').textContent=`${done+1}/${files.length} アップロード中...`;document.getElementById('progFill').style.width=((done/files.length)*100)+'%';
    try{const du=await resizeImg(file,1600);const b64=du.split(',')[1];
    await fetch(gasUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'upload',folderId,subFolder:sub,name:file.name,mime:file.type,data:b64})});done++;}
    catch(e){toast('⚠️ '+file.name+' 失敗');}
  }
  document.getElementById('progFill').style.width='100%';document.getElementById('progTxt').textContent=done+'枚完了！';
  setTimeout(()=>{prog.style.display='none';},2000);
  if(evNew&&!events.includes(evNew)){events.push(evNew);saveMeta();}
  document.getElementById('uploadEvNew').value='';document.getElementById('fileInput').value='';
  toast('📸 '+done+'枚アップロード');setTimeout(fetchPhotos,1500);
}
function resizeImg(file,maxW){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL(file.type,.85));};img.src=e.target.result;};rd.readAsDataURL(file);});}

function renderEvents(){
  const cnt={};photos.forEach(p=>{const ev=meta[p.id]?.event||p.folder||'';if(ev)cnt[ev]=(cnt[ev]||0)+1;});
  let h=`<div class="ev-chip${currentEv==='all'?' active':''}" onclick="filterEv('all')">📷 すべて<span class="ev-cnt">${photos.length}</span></div>`;
  events.forEach(ev=>{h+=`<div class="ev-chip${currentEv===ev?' active':''}" onclick="filterEv('${esc(ev)}')">${esc(ev)}<span class="ev-cnt">${cnt[ev]||0}</span></div>`;});
  document.getElementById('evBar').innerHTML=h;
}
function filterEv(ev){currentEv=ev;renderPhotos();renderEvents();}
function updateEvSel(){document.getElementById('uploadEv').innerHTML='<option value="">行事を選択</option>'+events.map(e=>`<option value="${esc(e)}">${esc(e)}</option>`).join('');}

function getFiltered(){let l=photos;if(currentEv!=='all')l=l.filter(p=>(meta[p.id]?.event||p.folder)===currentEv);return l;}
function renderPhotos(){
  const f=getFiltered();if(!f.length){document.getElementById('photoGrid').innerHTML='<div class="empty"><div class="empty-i">📷</div>写真がありません</div>';return;}
  const now=Date.now();
  document.getElementById('photoGrid').innerHTML=f.map(p=>{const m=meta[p.id]||{students:[],event:''};
  const tags=m.students.map(s=>`<span class="photo-stud-tag">${esc(s)}</span>`).join('');
  const evT=m.event?`<span class="photo-ev-tag">${esc(m.event)}</span>`:'';
  const isNew=p.date&&(now-new Date(p.date).getTime())<86400000;
  return`<div class="photo-card" onclick="openLB('${p.id}')"><img src="${p.url}" loading="lazy">${isNew?'<span class="photo-new">NEW</span>':''}<div class="photo-overlay">${evT}${tags}</div></div>`;}).join('');
}

function openLB(id){const f=getFiltered();lbIdx=f.findIndex(p=>p.id===id);if(lbIdx<0)return;document.getElementById('lb').classList.add('open');showLB();}
function closeLB(){document.getElementById('lb').classList.remove('open');}
function lbNav(dir){const f=getFiltered();lbIdx=(lbIdx+dir+f.length)%f.length;showLB();}
function showLB(){const f=getFiltered(),p=f[lbIdx];if(!p)return;document.getElementById('lbImg').src=p.urlFull||p.url;const m=meta[p.id]||{students:[],event:''};document.getElementById('lbInfo').textContent=(m.event||p.folder||'')+' ・ '+p.name;document.getElementById('lbTags').innerHTML=m.students.map(s=>`<span class="lb-tag">👤 ${esc(s)}</span>`).join('');}
document.addEventListener('keydown',e=>{if(document.getElementById('lb').classList.contains('open')){if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')closeLB();}});

function openTagModal(){const f=getFiltered(),p=f[lbIdx];if(!p)return;tagPhotoId=p.id;const m=meta[p.id]||{students:[]};tagSel=new Set(m.students||[]);renderTagModal();document.getElementById('tagModal').classList.add('open');}
function closeTagModal(){document.getElementById('tagModal').classList.remove('open');}
function renderTagModal(){document.getElementById('tagStudList').innerHTML=students.length?students.map(s=>`<div class="stud-opt${tagSel.has(s)?' on':''}" onclick="togTagS('${esc(s)}')">${esc(s)}</div>`).join(''):'<p style="font-size:.78rem;color:var(--text-sub)">🔧から名簿を登録してください</p>';}
function togTagS(s){if(tagSel.has(s))tagSel.delete(s);else tagSel.add(s);renderTagModal();}
function saveTagModal(){if(!tagPhotoId)return;if(!meta[tagPhotoId])meta[tagPhotoId]={students:[],event:''};meta[tagPhotoId].students=[...tagSel];saveMeta();closeTagModal();showLB();renderPhotos();toast('タグ保存');}

function openStudMgr(){document.getElementById('studModal').classList.add('open');document.getElementById('studInput').value=students.join('\n');}
function saveStudents(){students=document.getElementById('studInput').value.split('\n').map(l=>{l=l.trim();const p=l.split(/[,、\t]/);return(p.length>=2?p[p.length-1]:p[0]).trim();}).filter(s=>s);saveMeta();document.getElementById('studModal').classList.remove('open');toast('名簿保存');}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2500);}
init();
</script>
</body>
</html>
