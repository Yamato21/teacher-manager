<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>部費管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-card{background:white;border-radius:16px;padding:36px 28px;max-width:340px;width:100%;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.auth-icon{width:56px;height:56px;background:#185FA5;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.auth-icon svg{width:30px;height:30px;}
.auth-title{font-size:20px;font-weight:600;margin-bottom:6px;}
.auth-sub{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 16px;border:1.5px solid #ddd;border-radius:10px;background:white;font-size:15px;font-weight:500;cursor:pointer;}
.google-btn:hover{background:#f8f8f8;}

#app-screen{display:none;max-width:560px;margin:0 auto;padding:0 0 80px;}
.header{background:white;padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.header-icon{width:30px;height:30px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-icon svg{width:16px;height:16px;}
.header-title{font-size:17px;font-weight:600;flex:1;}
.header-actions{display:flex;align-items:center;gap:6px;}
.icon-btn{background:none;border:1px solid #e0e0e0;border-radius:8px;padding:5px 9px;cursor:pointer;color:#555;font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.icon-btn:hover{background:#f5f5f0;}
.icon-btn svg{width:13px;height:13px;}
.user-ava{width:26px;height:26px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#185FA5;flex-shrink:0;overflow:hidden;}
.user-ava img{width:100%;height:100%;object-fit:cover;}

.summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px;background:#f5f5f0;}
.sum-card{background:white;border-radius:10px;padding:10px 12px;border:1px solid #eee;}
.sum-label{font-size:11px;color:#888;margin-bottom:2px;}
.sum-val{font-size:17px;font-weight:700;}
.c-green{color:#0F6E56;}.c-red{color:#A32D2D;}.c-blue{color:#185FA5;}

.tate-alert{margin:0 16px 0;background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.tate-alert.hidden{display:none;}
.tate-alert-icon{width:20px;height:20px;background:#EF9F27;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tate-alert-icon svg{width:12px;height:12px;}
.tate-alert-text{flex:1;font-size:13px;color:#633806;font-weight:500;}
.tate-alert-amt{font-size:13px;font-weight:700;color:#412402;}

.unpaid-alert{margin:8px 16px 0;background:#FCEBEB;border:1px solid #E24B4A;border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.unpaid-alert.hidden{display:none;}
.unpaid-alert-icon{width:20px;height:20px;background:#E24B4A;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.unpaid-alert-icon svg{width:12px;height:12px;}
.unpaid-alert-text{flex:1;font-size:13px;color:#A32D2D;font-weight:500;}

.tab-bar{display:flex;border-bottom:1px solid #eee;padding:0 16px;background:white;overflow-x:auto;margin-top:10px;}
.tab{padding:10px 14px 8px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500;}
.tab-badge{background:#E24B4A;color:white;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:3px;vertical-align:middle;}
.tab-badge.amber{background:#EF9F27;}

/* ── 収支タブ ── */
.add-area{padding:12px 16px;}
.add-card{background:white;border:1px solid #eee;border-radius:14px;padding:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-label{font-size:11px;color:#888;margin-bottom:3px;display:block;}
.form-input{width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;background:white;color:#1a1a1a;}
.form-input:focus{outline:none;border-color:#185FA5;}
.form-group{margin-bottom:0;}
.tate-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;color:#666;background:white;user-select:none;margin-bottom:8px;}
.tate-toggle.checked{background:#FAEEDA;border-color:#EF9F27;color:#633806;font-weight:500;}
.tate-box{width:16px;height:16px;border:1.5px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tate-toggle.checked .tate-box{background:#EF9F27;border-color:#EF9F27;}
.chk{display:none;width:10px;height:10px;}
.tate-toggle.checked .chk{display:block;}
.img-preview-row{margin-bottom:8px;display:none;align-items:center;gap:8px;}
.img-preview-row.show{display:flex;}
.thumb-sm{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid #eee;}
.ai-btn-sm{padding:6px 10px;border:1px solid #185FA5;border-radius:8px;color:#185FA5;background:transparent;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.ai-btn-sm:hover{background:#dbeafe;}
.ai-loader-sm{display:none;align-items:center;gap:5px;font-size:12px;color:#888;}
.dot{width:5px;height:5px;border-radius:50%;background:#185FA5;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.add-row{display:flex;gap:8px;margin-top:8px;align-items:center;}
.receipt-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:#666;cursor:pointer;padding:8px 10px;border:1px solid #e0e0e0;border-radius:8px;background:white;white-space:nowrap;}
.receipt-btn:hover{background:#f5f5f0;}
.receipt-btn svg{width:13px;height:13px;}
.save-btn{flex:1;padding:9px 0;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;}
.save-btn.out{background:#A32D2D;color:white;}.save-btn.in{background:#0F6E56;color:white;}
.sync-status{font-size:11px;color:#aaa;text-align:center;padding:5px;display:flex;align-items:center;justify-content:center;gap:4px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#1D9E75;}
.sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite;}
.sync-dot.error{background:#E24B4A;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.list-area{padding:0 16px;}
.list-empty{text-align:center;padding:40px 0;color:#999;font-size:14px;}
.loading-state{text-align:center;padding:32px 0;color:#999;font-size:14px;}
.entry-card{background:white;border:1px solid #eee;border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.entry-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.entry-card.tate-card{border-color:#EF9F27;border-width:1.5px;}
.tate-bar{background:#FAEEDA;padding:4px 12px;display:flex;align-items:center;gap:5px;}
.tate-bar svg{width:11px;height:11px;flex-shrink:0;}
.tate-bar span{font-size:11px;font-weight:500;color:#633806;}
.tate-settled-bar{background:#f5f5f0;padding:4px 12px;}
.tate-settled-bar span{font-size:11px;color:#888;}
.entry-inner{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.entry-no{font-size:10px;font-weight:700;color:#bbb;flex-shrink:0;min-width:34px;font-family:monospace;}
.entry-type-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-out{background:#E24B4A;}.dot-in{background:#1D9E75;}
.entry-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid #eee;}
.entry-thumb-ph{width:40px;height:40px;border-radius:6px;background:#f5f5f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.entry-info{flex:1;min-width:0;}
.entry-purpose{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-meta{font-size:11px;color:#888;margin-top:2px;}
.entry-amt{text-align:right;flex-shrink:0;}
.entry-amt-val{font-size:15px;font-weight:700;}
.amt-out{color:#A32D2D;}.amt-in{color:#0F6E56;}

/* ── 部員・集金タブ ── */
.member-area{padding:12px 16px;}
.member-add-card{background:white;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:12px;}
.member-add-row{display:flex;gap:8px;}
.member-add-btn{padding:8px 14px;background:#185FA5;color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;}
.member-add-btn:hover{background:#0C447C;}

.fee-section{background:white;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:12px;}
.fee-section-title{font-size:13px;font-weight:600;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.fee-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.fee-row:last-child{margin-bottom:0;}
.fee-input-label{font-size:13px;color:#444;flex-shrink:0;min-width:60px;}
.fee-charge-btn{padding:8px 14px;background:#185FA5;color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}

.member-list-card{background:white;border:1px solid #eee;border-radius:14px;overflow:hidden;}
.member-list-header{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:0;padding:8px 14px;background:#f5f5f0;font-size:11px;font-weight:700;color:#888;}
.member-row{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:0;padding:10px 14px;border-top:1px solid #f0f0f0;align-items:center;}
.member-row:first-child{border-top:none;}
.member-name{font-size:14px;font-weight:500;}
.member-paid{font-size:13px;font-weight:700;color:#0F6E56;text-align:center;}
.member-unpaid{font-size:13px;font-weight:700;text-align:center;}
.member-unpaid.has-unpaid{color:#A32D2D;}
.member-unpaid.all-paid{color:#aaa;}
.member-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;text-align:center;padding:0;}
.member-del:hover{color:#A32D2D;}
.pay-toggle{display:flex;gap:4px;justify-content:center;}
.pay-chip{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;}
.pay-chip.paid{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.pay-chip.unpaid{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding-bottom:28px;transform:translateY(16px);transition:transform .2s;}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto;}
.modal-head{padding:0 16px 12px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.modal-no{font-size:12px;font-weight:700;color:#aaa;font-family:monospace;}
.mbadge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.mb-out{background:#FCEBEB;color:#A32D2D;}.mb-in{background:#E1F5EE;color:#085041;}
.mb-tate{background:#FAEEDA;color:#633806;}.mb-settled{background:#f0f0f0;color:#888;}
.modal-title2{font-size:15px;font-weight:500;flex:1;}
.modal-body2{padding:16px;}
.modal-img2{width:100%;max-height:220px;object-fit:contain;border-radius:10px;margin-bottom:14px;border:1px solid #eee;}
.drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px;gap:8px;}
.drow:last-child{border-bottom:none;}
.dlabel{color:#888;flex-shrink:0;}.dval{font-weight:500;text-align:right;}
.modal-actions2{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.settle-btn2{width:100%;padding:11px;background:#FAEEDA;border:1px solid #EF9F27;border-radius:10px;font-size:14px;color:#633806;font-weight:500;cursor:pointer;}
.close-btn2{padding:11px;background:#f5f5f0;border:1px solid #eee;border-radius:10px;font-size:14px;cursor:pointer;color:#666;width:100%;}
.del-btn2{padding:11px;background:#FCEBEB;border:none;color:#A32D2D;border-radius:10px;font-size:14px;cursor:pointer;width:100%;}

.menu-section-label{font-size:11px;color:#aaa;padding:12px 20px 4px;font-weight:700;letter-spacing:.06em;}
.menu-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:14px;cursor:pointer;border-bottom:1px solid #f5f5f0;color:#1a1a1a;}
.menu-item:hover{background:#f9f9f9;}
.menu-item:last-child{border-bottom:none;}
.menu-item svg{width:17px;height:17px;color:#555;flex-shrink:0;}
.menu-item.danger{color:#A32D2D;}.menu-item.danger svg{color:#A32D2D;}
.submenu{padding:0 20px 8px;display:flex;flex-direction:column;gap:6px;}
.submenu-btn{padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;cursor:pointer;background:white;color:#1a1a1a;text-align:left;display:flex;align-items:center;gap:8px;}
.submenu-btn:hover{background:#f5f5f0;}
.submenu-btn svg{width:15px;height:15px;color:#555;flex-shrink:0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── Print ── */
@media print{
  #auth-screen,#app-screen,#menu-modal,#detail-modal,.toast{display:none!important;}
  #print-area{display:block!important;padding:0;}
  .p-page{page-break-after:always;padding:20px 24px;}
  .p-page:last-child{page-break-after:auto;}
}
#print-area{display:none;}
.p-header{text-align:center;margin-bottom:18px;padding-bottom:12px;border-bottom:2.5px solid #1a1a1a;}
.p-title{font-size:22px;font-weight:700;margin-bottom:4px;}
.p-meta{font-size:11px;color:#777;margin-top:4px;}
.p-sum-row{display:flex;gap:16px;justify-content:center;margin-bottom:18px;}
.p-sum-item{text-align:center;background:#f5f5f0;border-radius:8px;padding:10px 18px;}
.p-sum-label{font-size:11px;color:#666;margin-bottom:2px;}
.p-sum-val{font-size:20px;font-weight:700;}
.p-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;}
.p-table th{background:#1a1a1a;color:white;padding:7px 8px;text-align:left;font-weight:600;}
.p-table td{padding:6px 8px;border-bottom:1px solid #eee;vertical-align:middle;}
.p-table tr:nth-child(even) td{background:#fafafa;}
.p-tate-badge{display:inline-block;background:#FAEEDA;color:#633806;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px;}
.p-out{color:#A32D2D;font-weight:700;}.p-in{color:#0F6E56;font-weight:700;}
.p-thumb{width:50px;height:50px;object-fit:cover;border-radius:4px;border:1px solid #eee;}
.p-paid{color:#0F6E56;font-weight:700;text-align:center;}
.p-unpaid{color:#A32D2D;font-weight:700;text-align:center;}
.p-na{color:#aaa;text-align:center;}
.p-receipt-card{border:1.5px solid #1a1a1a;border-radius:8px;padding:16px;margin-bottom:20px;break-inside:avoid;}
.p-receipt-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #ddd;}
.p-receipt-no{font-size:13px;font-weight:700;color:#888;font-family:monospace;margin-bottom:2px;}
.p-receipt-shop{font-size:18px;font-weight:700;}
.p-receipt-type{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.p-receipt-body{display:flex;gap:16px;}
.p-receipt-img{width:100px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #eee;flex-shrink:0;}
.p-receipt-img-ph{width:100px;height:100px;background:#f5f5f0;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:11px;border:1px solid #eee;}
.p-receipt-info{flex:1;}
.p-receipt-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:13px;}
.p-receipt-row:last-child{border-bottom:none;}
.p-receipt-label{color:#888;}.p-receipt-val{font-weight:500;}
.p-receipt-amt{font-size:22px;font-weight:700;margin-top:8px;}
.p-report-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
.p-report-card{border:1.5px solid #1a1a1a;border-radius:8px;padding:12px;text-align:center;}
.p-report-card-label{font-size:11px;color:#555;margin-bottom:4px;}
.p-report-card-val{font-size:24px;font-weight:700;}
.p-chart-wrap{margin-bottom:20px;}
.p-chart-title{font-size:13px;font-weight:600;margin-bottom:8px;border-left:4px solid #1a1a1a;padding-left:8px;}
.p-bar-chart{display:flex;flex-direction:column;gap:6px;}
.p-bar-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.p-bar-label{width:130px;flex-shrink:0;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-bar-track{flex:1;background:#f0f0f0;border-radius:3px;height:18px;overflow:hidden;}
.p-bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:white;font-weight:600;min-width:30px;}
.p-bar-val{min-width:70px;text-align:right;font-weight:600;color:#333;}
.p-section-title{font-size:14px;font-weight:700;margin-bottom:10px;padding:5px 10px;background:#dbeafe;border-radius:4px;color:#185FA5;}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
    <div class="auth-title">部費管理</div>
    <div class="auth-sub">Googleアカウントでサインインすると<br>どの端末からでも確認できます</div>
    <button class="google-btn" onclick="signIn()">

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut as fbOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,push,set,remove,onValue,update}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app=initializeApp({apiKey:"AIzaSyDf3t53cUMrcKSDiuOgj4Ffa6RqmmcdDn4",authDomain:"teacher-manager-d4623.firebaseapp.com",databaseURL:"https://teacher-manager-d4623-default-rtdb.firebaseio.com",projectId:"teacher-manager-d4623",storageBucket:"teacher-manager-d4623.firebasestorage.app",messagingSenderId:"388614519592",appId:"1:388614519592:web:7e2c60e6ac937c9212ee1d"});
const auth=getAuth(app),db=getDatabase(app);
let user=null,entries={},members={},tab='all',imgData=null,isTate=false,viewId=null,unsubE=null,unsubM=null;

// ── Auth ──────────────────────────────────────────
window.signIn=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(err){toast('サインインに失敗しました');}};
window.doSignOut=async()=>{if(!confirm('サインアウトしますか？'))return;if(unsubE)unsubE();if(unsubM)unsubM();await fbOut(auth);show('auth-screen');hide('app-screen');entries={};members={};};
onAuthStateChanged(auth,u=>{
  if(u){user=u;hide('auth-screen');show2('app-screen');
    const a=document.getElementById('user-ava');a.innerHTML=u.photoURL?`<img src="${u.photoURL}">`:(u.displayName||u.email||'?')[0].toUpperCase();
    subEntries(u.uid);subMembers(u.uid);
  }else{show('auth-screen');hide('app-screen');}
});
function subEntries(uid){setSy('syncing');unsubE=onValue(ref(db,`club_expense/${uid}/entries`),s=>{entries=s.val()||{};summ();renderList();setSy('ok');},()=>setSy('error'));}
function subMembers(uid){unsubM=onValue(ref(db,`club_expense/${uid}/members`),s=>{members=s.val()||{};renderMembers();updateUnpaidAlert();});}
function setSy(s){document.getElementById('sync-dot').className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');document.getElementById('sync-text').textContent=s==='syncing'?'同期中...':s==='error'?'同期エラー':'同期済み';}
function show(id){document.getElementById(id).style.display='flex';}
function show2(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}

// ── 収支 Save ─────────────────────────────────────
window.saveEntry=async type=>{
  if(!user)return;
  const amount=parseFloat(document.getElementById('f-amount').value);
  if(!amount||amount<=0){toast('金額を入力してください');return;}
  const purpose=document.getElementById('f-purpose').value.trim();
  if(!purpose){toast('用途を入力してください');return;}
  const date=document.getElementById('f-date').value;
  if(!date){toast('日付を入力してください');return;}
  const memo=document.getElementById('f-memo').value.trim();
  const nums=Object.values(entries).map(e=>e.num||0);
  const nextNum=(nums.length?Math.max(...nums):0)+1;
  let imgBase64=null;
  if(imgData){try{imgBase64=await compImg(imgData,600,.6);}catch(err){}}
  setSy('syncing');
  await set(push(ref(db,`club_expense/${user.uid}/entries`)),{num:nextNum,type,amount,purpose,date,memo,tate:isTate,settled:false,imgBase64:imgBase64||null,createdAt:Date.now()});
  document.getElementById('f-amount').value='';document.getElementById('f-purpose').value='';document.getElementById('f-memo').value='';
  isTate=false;document.getElementById('tate-toggle').classList.remove('checked');clearImg();
  toast(`${ns(nextNum)} として記録しました`);
};
window.settleEntry=async()=>{if(!viewId||!user)return;if(!confirm('精算済みにしますか？'))return;setSy('syncing');await update(ref(db,`club_expense/${user.uid}/entries/${viewId}`),{settled:true});setTimeout(()=>openDetail(viewId),300);toast('精算済みにしました');};
window.deleteEntry=async id=>{if(!user)return;if(!confirm('この記録を削除しますか？'))return;setSy('syncing');await remove(ref(db,`club_expense/${user.uid}/entries/${id}`));closeModal('detail-modal');toast('削除しました');};
window.deleteAll=async()=>{if(!user)return;if(!confirm('全記録・全部員を削除しますか？\nこの操作は元に戻せません。'))return;if(!confirm('本当に削除しますか？'))return;setSy('syncing');await remove(ref(db,`club_expense/${user.uid}/entries`));await remove(ref(db,`club_expense/${user.uid}/members`));toast('全データを削除しました');};

// ── 部員管理 ──────────────────────────────────────
window.addMember=async()=>{
  if(!user)return;
  const name=document.getElementById('m-name-in').value.trim();
  if(!name){toast('部員名を入力してください');return;}
  const exists=Object.values(members).some(m=>m.name===name);
  if(exists){toast('同じ名前の部員がいます');return;}
  await set(push(ref(db,`club_expense/${user.uid}/members`)),{name,fees:{},createdAt:Date.now()});
  document.getElementById('m-name-in').value='';
  toast(`${name} を追加しました`);
};
window.deleteMember=async id=>{
  if(!user)return;
  const m=members[id];if(!m)return;
  if(!confirm(`${m.name} を削除しますか？`))return;
  await remove(ref(db,`club_expense/${user.uid}/members/${id}`));
  toast('削除しました');
};

window.chargeAll=async()=>{
  if(!user)return;
  const label=document.getElementById('fee-label').value.trim();
  if(!label){toast('集金名を入力してください');return;}
  const amount=parseFloat(document.getElementById('fee-amount').value);
  if(!amount||amount<=0){toast('金額を入力してください');return;}
  const mkeys=Object.keys(members);
  if(!mkeys.length){toast('部員が登録されていません');return;}
  if(!confirm(`全${mkeys.length}人に「${label}」${fmt(amount)}を請求しますか？`))return;
  const feeId='fee_'+Date.now();
  for(const id of mkeys){
    await update(ref(db,`club_expense/${user.uid}/members/${id}/fees`),{[feeId]:{label,amount,paid:false,createdAt:Date.now()}});
  }
  document.getElementById('fee-label').value='';document.getElementById('fee-amount').value='';
  toast(`${mkeys.length}人に請求しました`);
};

window.togglePay=async(memberId,feeId,currentPaid)=>{
  if(!user)return;
  await update(ref(db,`club_expense/${user.uid}/members/${memberId}/fees/${feeId}`),{paid:!currentPaid});
};

// ── UI helpers ────────────────────────────────────
const fmt=n=>'¥'+Math.round(n).toLocaleString();
const ns=n=>'#'+String(n||0).padStart(3,'0');
const fd=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;};
const tdStr=()=>new Date().toISOString().slice(0,10).replace(/-/g,'');
const tdJP=()=>new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
const sortedE=(f)=>{let a=Object.entries(entries).map(([id,e])=>({id,...e}));if(f==='tate')a=a.filter(e=>e.tate);else if(f&&f!=='all')a=a.filter(e=>e.type===f);return a.sort((a,b)=>new Date(b.date)-new Date(a.date)||b.createdAt-a.createdAt);};

function summ(){
  const a=Object.values(entries);
  const inc=a.filter(e=>e.type==='in').reduce((s,e)=>s+e.amount,0);
  const exp=a.filter(e=>e.type==='out').reduce((s,e)=>s+e.amount,0);
  document.getElementById('s-in').textContent=fmt(inc);
  document.getElementById('s-out').textContent=fmt(exp);
  const bal=inc-exp;const el=document.getElementById('s-bal');el.textContent=fmt(bal);el.className='sum-val '+(bal>=0?'c-blue':'c-red');
  const uns=a.filter(e=>e.tate&&!e.settled);
  const alert=document.getElementById('tate-alert'),badge=document.getElementById('tate-badge');
  if(uns.length){alert.classList.remove('hidden');document.getElementById('tate-alert-text').textContent=`立替 ${uns.length}件が未精算`;document.getElementById('tate-alert-amt').textContent=fmt(uns.reduce((s,e)=>s+e.amount,0));badge.textContent=uns.length;badge.style.display='inline-block';}
  else{alert.classList.add('hidden');badge.style.display='none';}
}

function updateUnpaidAlert(){
  let unpaidCount=0;
  Object.values(members).forEach(m=>{Object.values(m.fees||{}).forEach(f=>{if(!f.paid)unpaidCount++;});});
  const alert=document.getElementById('unpaid-alert'),badge=document.getElementById('unpaid-badge');
  if(unpaidCount){alert.classList.remove('hidden');document.getElementById('unpaid-alert-text').textContent=`未払いの部費が ${unpaidCount}件あります`;badge.textContent=unpaidCount;badge.style.display='inline-block';}
  else{alert.classList.add('hidden');badge.style.display='none';}
}

const ph=`<svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" width="16" height="16"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>`;
function renderList(){
  const list=document.getElementById('entry-list');
  const arr=sortedE(tab==='members'?'all':tab);
  if(!arr.length){list.innerHTML='<div class="list-empty">記録がありません</div>';return;}
  list.innerHTML=arr.map(e=>`
    <div class="entry-card${e.tate&&!e.settled?' tate-card':''}" onclick="openDetail('${e.id}')">
      ${e.tate&&!e.settled?`<div class="tate-bar"><svg viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>立替・未精算</span></div>`:''}
      ${e.tate&&e.settled?`<div class="tate-settled-bar"><span>立替・精算済</span></div>`:''}
      <div class="entry-inner">
        <span class="entry-no">${ns(e.num)}</span>
        <div class="entry-type-dot ${e.type==='out'?'dot-out':'dot-in'}"></div>
        ${e.imgBase64?`<img class="entry-thumb" src="${e.imgBase64}" alt="">`:`<div class="entry-thumb-ph">${ph}</div>`}
        <div class="entry-info"><div class="entry-purpose">${e.purpose||'(用途未記入)'}</div><div class="entry-meta">${fd(e.date)}${e.memo?' · '+e.memo:''}</div></div>
        <div class="entry-amt"><div class="entry-amt-val ${e.type==='out'?'amt-out':'amt-in'}">${e.type==='out'?'−':'＋'}${fmt(e.amount)}</div></div>
      </div>
    </div>`).join('');
}

function renderMembers(){
  const list=document.getElementById('member-list');
  const arr=Object.entries(members).sort((a,b)=>a[1].createdAt-b[1].createdAt);
  if(!arr.length){list.innerHTML='<div style="padding:20px;text-align:center;color:#999;font-size:14px;">部員がいません</div>';return;}
  list.innerHTML=arr.map(([id,m])=>{
    const fees=Object.entries(m.fees||{});
    const paidAmt=fees.filter(([,f])=>f.paid).reduce((s,[,f])=>s+f.amount,0);
    const unpaidAmt=fees.filter(([,f])=>!f.paid).reduce((s,[,f])=>s+f.amount,0);
    const feeChips=fees.map(([fid,f])=>`<span class="pay-chip ${f.paid?'paid':'unpaid'}" onclick="togglePay('${id}','${fid}',${f.paid})" title="${f.label}">${f.paid?'✓':'!'} ${f.label}</span>`).join('');
    return`<div class="member-row">
      <div>
        <div class="member-name">${m.name}</div>
        ${fees.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${feeChips}</div>`:'<div style="font-size:11px;color:#ccc;margin-top:2px;">請求なし</div>'}
      </div>
      <div class="member-paid">${paidAmt?fmt(paidAmt):'—'}</div>
      <div class="member-unpaid ${unpaidAmt?'has-unpaid':'all-paid'}">${unpaidAmt?fmt(unpaidAmt):'—'}</div>
      <button class="member-del" onclick="deleteMember('${id}')">×</button>
    </div>`;
  }).join('');
}

// ── Tab ───────────────────────────────────────────
window.setTab=(t,el)=>{
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');
  if(t==='members'){hide('ledger-area');show2('members-area');}
  else{show2('ledger-area');hide('members-area');renderList();}
};

// ── Detail modal ──────────────────────────────────
window.openDetail=id=>{
  viewId=id;const e=entries[id];if(!e)return;
  document.getElementById('m-no').textContent=ns(e.num);
  document.getElementById('m-badge').textContent=e.type==='out'?'出金':'入金';
  document.getElementById('m-badge').className='mbadge '+(e.type==='out'?'mb-out':'mb-in');
  const tb=document.getElementById('m-tate-badge');
  if(e.tate){tb.style.display='inline-block';tb.textContent=e.settled?'立替・精算済':'立替・未精算';tb.className='mbadge '+(e.settled?'mb-settled':'mb-tate');}else tb.style.display='none';
  document.getElementById('m-title').textContent=e.purpose||'(用途未記入)';
  const img=document.getElementById('m-img');if(e.imgBase64){img.src=e.imgBase64;img.style.display='block';}else img.style.display='none';
  document.getElementById('m-details').innerHTML=`
    <div class="drow"><span class="dlabel">No.</span><span class="dval">${ns(e.num)}</span></div>
    <div class="drow"><span class="dlabel">種別</span><span class="dval">${e.type==='out'?'出金':'入金'}</span></div>
    <div class="drow"><span class="dlabel">金額</span><span class="dval" style="color:${e.type==='out'?'#A32D2D':'#0F6E56'};font-size:18px;">${e.type==='out'?'−':'＋'}${fmt(e.amount)}</span></div>
    <div class="drow"><span class="dlabel">日付</span><span class="dval">${fd(e.date)}</span></div>
    <div class="drow"><span class="dlabel">用途</span><span class="dval">${e.purpose||'—'}</span></div>
    ${e.memo?`<div class="drow"><span class="dlabel">メモ</span><span class="dval">${e.memo}</span></div>`:''}
    ${e.tate?`<div class="drow"><span class="dlabel">立替</span><span class="dval" style="color:${e.settled?'#888':'#BA7517'}">${e.settled?'精算済み':'未精算'}</span></div>`:''}`;
  document.getElementById('m-settle').style.display=(e.tate&&!e.settled)?'block':'none';
  document.getElementById('m-del').onclick=()=>deleteEntry(id);
  openModal('detail-modal');
};

// ── Form helpers ──────────────────────────────────
window.toggleTate=()=>{isTate=!isTate;document.getElementById('tate-toggle').classList.toggle('checked',isTate);};
window.handleFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{imgData=ev.target.result;document.getElementById('preview-thumb').src=imgData;document.getElementById('img-preview-row').classList.add('show');};r.readAsDataURL(f);};
window.clearImg=()=>{imgData=null;document.getElementById('img-preview-row').classList.remove('show');document.getElementById('file-in').value='';};
window.runAI=async()=>{
  if(!imgData)return;
  const btn=document.getElementById('ai-btn-sm'),ldr=document.getElementById('ai-loader-sm');
  btn.style.display='none';ldr.style.display='flex';
  const b64=imgData.split(',')[1],mt=imgData.split(';')[0].split(':')[1]||'image/jpeg';
  try{
    const d=(await(await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:'レシート画像から情報抽出しJSONのみ返答。{"shop":"店名","total":合計数値,"date":"YYYY-MM-DD"}。不明はnull。JSONのみ。',messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:'読み取ってください'}]}]})})).json());
    const p=JSON.parse(d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim());
    if(p.total)document.getElementById('f-amount').value=p.total;
    if(p.date)document.getElementById('f-date').value=p.date;
    if(p.shop&&!document.getElementById('f-purpose').value)document.getElementById('f-purpose').value=p.shop;
    toast('読み取り完了');
  }catch(err){toast('読み取り失敗。手動で入力してください。');}
  ldr.style.display='none';btn.style.display='flex';
};

window.printReport=()=>{
  const arr=Object.entries(entries).map(([id,e])=>({id,...e})).sort((a,b)=>a.num-b.num);
  const inc=arr.filter(e=>e.type==='in').reduce((s,e)=>s+e.amount,0);
  const exp=arr.filter(e=>e.type==='out').reduce((s,e)=>s+e.amount,0);
  const byOut={};arr.filter(e=>e.type==='out').forEach(e=>{const k=e.purpose||'その他';byOut[k]=(byOut[k]||0)+e.amount;});
  const byIn={};arr.filter(e=>e.type==='in').forEach(e=>{const k=e.purpose||'その他';byIn[k]=(byIn[k]||0)+e.amount;});
  const mkBars=(obj,color)=>{const s=Object.entries(obj).sort((a,b)=>b[1]-a[1]);const mx=s[0]?s[0][1]:1;return s.map(([k,v])=>{const p=Math.round(v/mx*100);return`<div class="p-bar-row"><div class="p-bar-label" title="${k}">${k}</div><div class="p-bar-track"><div class="p-bar-fill" style="width:${p}%;background:${color}">${p}%</div></div><div class="p-bar-val">${fmt(v)}</div></div>`;}).join('');};
  const tateArr=arr.filter(e=>e.tate);
  const tateRows=tateArr.map(e=>`<tr><td style="font-family:monospace">${ns(e.num)}</td><td>${fd(e.date)}</td><td>${e.purpose||''}</td><td style="text-align:right;font-weight:700">${fmt(e.amount)}</td><td style="color:${e.settled?'#888':'#BA7517'};font-weight:600">${e.settled?'精算済':'未精算'}</td></tr>`).join('');
  document.getElementById('print-area').innerHTML=`<div class="p-page">
    <div class="p-header"><div class="p-title">部費 収支報告書</div><div class="p-meta">印刷日：${tdJP()} ／ 全${arr.length}件</div></div>
    <div class="p-report-summary">
      <div class="p-report-card"><div class="p-report-card-label">入金合計</div><div class="p-report-card-val" style="color:#0F6E56">${fmt(inc)}</div></div>
      <div class="p-report-card"><div class="p-report-card-label">出金合計</div><div class="p-report-card-val" style="color:#A32D2D">${fmt(exp)}</div></div>
      <div class="p-report-card"><div class="p-report-card-label">残高</div><div class="p-report-card-val" style="color:${inc-exp>=0?'#185FA5':'#A32D2D'}">${fmt(inc-exp)}</div></div>
    </div>
    ${Object.keys(byOut).length?`<div class="p-chart-wrap"><div class="p-chart-title">出金内訳（用途別）</div><div class="p-bar-chart">${mkBars(byOut,'#A32D2D')}</div></div>`:''}
    ${Object.keys(byIn).length?`<div class="p-chart-wrap"><div class="p-chart-title">入金内訳（用途別）</div><div class="p-bar-chart">${mkBars(byIn,'#0F6E56')}</div></div>`:''}
    ${tateArr.length?`<div style="margin-top:16px;"><div class="p-section-title">立替一覧（全${tateArr.length}件）</div><table class="p-table"><thead><tr><th>No.</th><th>日付</th><th>用途</th><th style="text-align:right">金額</th><th>精算</th></tr></thead><tbody>${tateRows}</tbody></table></div>`:''}
  </div>`;
  window.print();
};

window.printMembers=()=>{
  const arr=Object.entries(members).sort((a,b)=>a[1].createdAt-b[1].createdAt);
  // 集金項目一覧を収集
  const feeLabels=new Set();
  arr.forEach(([,m])=>Object.values(m.fees||{}).forEach(f=>feeLabels.add(f.label)));
  const labels=[...feeLabels];
  const rows=arr.map(([id,m])=>{
    const fees=m.fees||{};
    const paidAmt=Object.values(fees).filter(f=>f.paid).reduce((s,f)=>s+f.amount,0);
    const unpaidAmt=Object.values(fees).filter(f=>!f.paid).reduce((s,f)=>s+f.amount,0);
    const feeCols=labels.map(lbl=>{
      const f=Object.values(fees).find(f=>f.label===lbl);
      if(!f)return`<td class="p-na">—</td>`;
      return`<td class="${f.paid?'p-paid':'p-unpaid'}">${f.paid?'✓':'未払'}</td>`;
    }).join('');
    return`<tr><td style="font-weight:500">${m.name}</td>${feeCols}<td class="p-in" style="text-align:right">${paidAmt?fmt(paidAmt):'—'}</td><td class="p-out" style="text-align:right">${unpaidAmt?fmt(unpaidAmt):'—'}</td></tr>`;
  }).join('');
  const thCols=labels.map(l=>`<th style="text-align:center">${l}</th>`).join('');
  document.getElementById('print-area').innerHTML=`<div class="p-page">
    <div class="p-header"><div class="p-title">部員・集金一覧</div><div class="p-meta">印刷日：${tdJP()} ／ 全${arr.length}名</div></div>
    ${arr.length?`<table class="p-table"><thead><tr><th>部員名</th>${thCols}<th style="text-align:right">支払済</th><th style="text-align:right">未払い</th></tr></thead><tbody>${rows}</tbody></table>`:'<p style="color:#999;text-align:center;padding:20px">部員がいません</p>'}
  </div>`;
  window.print();
};

// ── Export / Import ───────────────────────────────
window.exportCSV=()=>{
  const arr=Object.entries(entries).map(([id,e])=>({id,...e})).sort((a,b)=>a.num-b.num);
  const BOM='\uFEFF',hdr='No.,日付,種別,用途,金額,立替,精算済,メモ\n';
  const rows=arr.map(e=>[ns(e.num),e.date,e.type==='out'?'出金':'入金',`"${(e.purpose||'').replace(/"/g,'""')}"`,e.type==='out'?-e.amount:e.amount,e.tate?'あり':'なし',e.settled?'済':'未',`"${(e.memo||'').replace(/"/g,'""')}"`].join(',')).join('\n');
  dlb(new Blob([BOM+hdr+rows],{type:'text/csv;charset=utf-8'}),`部費_${tdStr()}.csv`);
  toast('CSVを保存しました');
};
window.exportJSON=()=>{dlb(new Blob([JSON.stringify({exportedAt:new Date().toISOString(),entries,members},null,2)],{type:'application/json'}),`部費バックアップ_${tdStr()}.json`);toast('JSONバックアップを保存しました');};
window.importJSON=()=>document.getElementById('json-import-in').click();
window.handleJSONImport=async e=>{
  if(!user)return;const f=e.target.files[0];if(!f)return;
  try{
    const d=JSON.parse(await f.text());
    const impE=d.entries;const impM=d.members;
    if(!impE&&!impM)throw 0;
    if(!confirm('バックアップから復元しますか？現在のデータは上書きされます。'))return;
    setSy('syncing');
    if(impE&&typeof impE==='object'&&!Array.isArray(impE))await set(ref(db,`club_expense/${user.uid}/entries`),impE);
    if(impM&&typeof impM==='object'&&!Array.isArray(impM))await set(ref(db,`club_expense/${user.uid}/members`),impM);
    toast('復元しました');
  }catch(err){toast('ファイルの読み込みに失敗しました');}
  e.target.value='';
};

// ── Modal helpers ─────────────────────────────────
window.openModal=id=>document.getElementById(id).classList.add('open');
window.closeModal=id=>document.getElementById(id).classList.remove('open');
window.closeBg=(e,id)=>{if(e.target===document.getElementById(id))closeModal(id);};

function dlb(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function compImg(d,mw,q){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>{const s=Math.min(1,mw/i.width),w=Math.round(i.width*s),h=Math.round(i.height*s),c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res(c.toDataURL('image/jpeg',q));};i.onerror=rej;i.src=d;});}

document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
